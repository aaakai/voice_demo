<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Voice Interrupt Demo</title>
  <style>
    :root {
      --bg: #f4f6f8;
      --panel: #ffffff;
      --ink: #18212f;
      --muted: #657084;
      --line: #d9dee7;
      --brand: #165dff;
      --brand-soft: #e8f0ff;
      --user: #eef7f1;
      --assistant: #f6f7fb;
      --danger: #d64545;
      --ok: #167a4a;
      --warn: #9b6400;
      --shadow: 0 18px 50px rgba(24, 33, 47, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      overflow: hidden;
      min-height: 100vh;
      color: var(--ink);
      font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.68), rgba(255,255,255,0)),
        var(--bg);
    }

    button {
      font: inherit;
    }

    .shell {
      width: min(1180px, calc(100vw - 32px));
      height: calc(100vh - 56px);
      margin: 28px auto;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 320px;
      gap: 18px;
      min-height: 0;
    }

    .console {
      height: 100%;
      min-height: 0;
      display: grid;
      grid-template-rows: auto auto minmax(0, 1fr) auto;
      overflow: hidden;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 16px;
      box-shadow: var(--shadow);
    }

    .topbar {
      padding: 18px 20px 14px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
    }

    .title h1 {
      margin: 0;
      font-size: 19px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .title p {
      margin: 5px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .state-pill {
      padding: 7px 10px;
      border-radius: 999px;
      background: var(--brand-soft);
      color: var(--brand);
      font-size: 13px;
      font-weight: 700;
      white-space: nowrap;
    }

    .scenario-bar {
      display: flex;
      gap: 8px;
      padding: 12px 20px;
      border-bottom: 1px solid var(--line);
      flex-wrap: wrap;
    }

    .scenario-bar button,
    .controls button {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      border-radius: 8px;
      padding: 8px 11px;
      cursor: pointer;
    }

    .scenario-bar button:hover,
    .controls button:hover {
      border-color: #9eb5ff;
    }

    .scenario-bar button.active,
    .controls button.primary {
      background: var(--brand);
      border-color: var(--brand);
      color: #fff;
    }

    .timeline {
      min-height: 0;
      padding: 18px 20px;
      overflow-y: auto;
      background:
        linear-gradient(180deg, rgba(248,250,252,0.8), rgba(255,255,255,0));
    }

    .message {
      max-width: 76%;
      margin: 0 0 14px;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--assistant);
    }

    .message.user {
      margin-left: auto;
      background: var(--user);
      border-color: #cde6d4;
    }

    .message.interrupted {
      border-color: rgba(214, 69, 69, 0.45);
      background: #fff5f5;
    }

    .meta {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 6px;
    }

    .text {
      white-space: pre-wrap;
      line-height: 1.55;
      font-size: 15px;
    }

    .controls {
      border-top: 1px solid var(--line);
      padding: 14px 20px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 14px;
      align-items: center;
    }

    .live {
      min-height: 42px;
      max-height: 72px;
      overflow-y: auto;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 9px 11px;
      color: var(--muted);
      background: #fbfcfe;
      line-height: 1.45;
    }

    .live strong {
      color: var(--ink);
      overflow-wrap: anywhere;
    }

    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    aside {
      height: 100%;
      min-height: 0;
      display: grid;
      grid-template-rows: minmax(260px, auto) minmax(0, 1fr);
      gap: 18px;
    }

    .panel {
      min-height: 0;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 16px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .panel h2 {
      margin: 0;
      padding: 14px 15px;
      font-size: 14px;
      border-bottom: 1px solid var(--line);
    }

    .kv {
      padding: 12px 15px;
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
      font-size: 13px;
      max-height: 260px;
      overflow-y: auto;
    }

    .kv div {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      border-bottom: 1px dashed #e8ebf1;
      padding-bottom: 7px;
      min-width: 0;
    }

    .kv span:first-child {
      color: var(--muted);
      flex: 0 0 auto;
    }

    .kv strong {
      min-width: 0;
      max-width: 180px;
      overflow: hidden;
      text-align: right;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .agent-lanes {
      padding: 12px 15px 0;
      display: grid;
      gap: 9px;
    }

    .agent-lane {
      border: 1px solid #e5e9f1;
      border-radius: 10px;
      padding: 9px 10px;
      background: #fbfcfe;
      display: grid;
      gap: 6px;
    }

    .agent-lane.active {
      border-color: #9eb5ff;
      background: #f4f8ff;
    }

    .agent-lane.warn {
      border-color: rgba(155, 100, 0, 0.34);
      background: #fffaf0;
    }

    .agent-lane.danger {
      border-color: rgba(214, 69, 69, 0.34);
      background: #fff5f5;
    }

    .agent-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      font-size: 13px;
      font-weight: 700;
    }

    .agent-status {
      color: var(--muted);
      font-weight: 600;
      white-space: nowrap;
    }

    .agent-detail {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .log {
      height: 100%;
      min-height: 0;
      padding: 12px 15px;
      overflow-y: auto;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px;
      line-height: 1.45;
      color: #3c4658;
      background: #fbfcfe;
    }

    .log-row {
      border-bottom: 1px solid #eef1f6;
      padding: 6px 0;
    }

    @media (max-width: 880px) {
      body {
        overflow: auto;
      }

      .shell {
        grid-template-columns: 1fr;
        height: auto;
      }

      .console,
      aside {
        min-height: auto;
        height: auto;
      }

      .controls {
        grid-template-columns: 1fr;
      }

      .actions {
        justify-content: flex-start;
      }

      .message {
        max-width: 92%;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="console">
      <header class="topbar">
        <div class="title">
          <h1>Voice Interrupt Demo</h1>
          <p>Mock ASR + dialogue pipeline + floor-taking policy</p>
        </div>
        <div id="statePill" class="state-pill">idle</div>
      </header>

      <nav class="scenario-bar" aria-label="Scenario selector">
        <button data-scenario="1" class="active">1 正常问答</button>
        <button data-scenario="2">2 提前短答</button>
        <button data-scenario="3">3 用户打断</button>
        <button data-scenario="4">4 主动追问</button>
        <button data-scenario="5">5 纠偏抢话</button>
        <button data-scenario="all">All</button>
      </nav>

      <section id="timeline" class="timeline" aria-live="polite"></section>

      <footer class="controls">
        <div id="liveTranscript" class="live">Live transcript: <strong>等待开始</strong></div>
        <div class="actions">
          <button id="startBtn" class="primary">Start</button>
          <button id="stopBtn">Stop</button>
          <button id="bargeBtn">Simulate Interrupt</button>
          <button id="clearBtn">Clear</button>
        </div>
      </footer>
    </section>

    <aside>
      <section class="panel">
        <h2>State</h2>
        <div id="agentLanes" class="agent-lanes"></div>
        <div id="debug" class="kv"></div>
      </section>
      <section class="panel">
        <h2>Event Log</h2>
        <div id="log" class="log"></div>
      </section>
    </aside>
  </main>

  <script>
    const settings = {
      floorPolicyPollMs: 100,
      softTakeFloorPauseMs: 450,
      hardTakeFloorPauseMs: 350,
      clarifyPauseMs: 420,
      backchannelPauseMinMs: 450,
      backchannelPauseMaxMs: 1200,
      backchannelMinConfidence: 0.45,
      softTakeFloorMinConfidence: 0.72,
      proactiveCooldownMs: 2400,
      bargeInTextMinLen: 2,
    };

    const scenarios = {
      1: [
        [200, "user_speech_started", "s1-normal", {}],
        [220, "partial_transcript", "s1-normal", { text: "请你做个" }],
        [260, "partial_transcript", "s1-normal", { text: "请你做个自我介绍" }],
        [360, "final_transcript", "s1-normal", { text: "请你做个自我介绍" }],
        [80, "user_speech_stopped", "s1-normal", {}],
      ],
      2: [
        [200, "user_speech_started", "s2-pause", {}],
        [220, "partial_transcript", "s2-pause", { text: "我想问一下" }],
        [260, "partial_transcript", "s2-pause", { text: "我想问一下北京明天的天气" }],
        [1200, "partial_transcript", "s2-pause", { text: "我想问一下北京明天的天气还有出门建议" }],
        [420, "final_transcript", "s2-pause", { text: "我想问一下北京明天的天气还有出门建议" }],
        [80, "user_speech_stopped", "s2-pause", {}],
      ],
      3: [
        [180, "user_speech_started", "s3-first", {}],
        [180, "partial_transcript", "s3-first", { text: "请你详细讲讲这个系统" }],
        [220, "final_transcript", "s3-first", { text: "请你详细讲讲这个系统" }],
        [80, "user_speech_stopped", "s3-first", {}],
        [900, "user_speech_started", "s3-barge", {}],
        [120, "partial_transcript", "s3-barge", { text: "等等" }],
        [180, "partial_transcript", "s3-barge", { text: "等等我换个问题" }],
        [220, "final_transcript", "s3-barge", { text: "等等我换个问题，怎么快速接入真实语音" }],
        [80, "user_speech_stopped", "s3-barge", {}],
      ],
      4: [
        [200, "user_speech_started", "s4-clarify", {}],
        [220, "partial_transcript", "s4-clarify", { text: "我想问天气" }],
        [1000, "partial_transcript", "s4-clarify", { text: "我想问天气大概怎么样" }],
        [520, "final_transcript", "s4-clarify", { text: "我想问天气大概怎么样" }],
        [80, "user_speech_stopped", "s4-clarify", {}],
      ],
      5: [
        [200, "user_speech_started", "s5-correct", {}],
        [180, "partial_transcript", "s5-correct", { text: "不是北京" }],
        [560, "partial_transcript", "s5-correct", { text: "不是北京，不对，是上海明天的天气" }],
        [420, "final_transcript", "s5-correct", { text: "不是北京，不对，是上海明天的天气" }],
        [80, "user_speech_stopped", "s5-correct", {}],
      ],
    };

    const context = {
      state: "idle",
      running: false,
      selectedScenario: "1",
      userSpeaking: false,
      assistantSpeaking: false,
      floorOwner: "none",
      currentTurnId: "",
      activeTtsTurnId: "",
      latestPartial: "",
      latestFinal: "",
      currentDraft: emptyDraft(),
      responseDraft: "",
      currentResponseText: "",
      lastPartialAt: 0,
      cooldownUntil: 0,
      seenBackchannelTurns: new Set(),
      takenFloorTurns: new Set(),
      timers: [],
      messages: [],
      activeAssistantMessageId: "",
      inputFinished: false,
      pendingReply: null,
      lastFloorDecision: emptyDecision("init"),
      lastDecisionKey: "",
      agents: {
        main: { status: "idle", detail: "等待 final transcript" },
        interrupt: { status: "watching", detail: "监听 partial、停顿和纠正词" },
        playback: { status: "idle", detail: "等待播报任务" },
      },
    };

    const timelineEl = document.getElementById("timeline");
    const liveEl = document.getElementById("liveTranscript");
    const statePillEl = document.getElementById("statePill");
    const agentLanesEl = document.getElementById("agentLanes");
    const debugEl = document.getElementById("debug");
    const logEl = document.getElementById("log");
    const startBtn = document.getElementById("startBtn");
    const stopBtn = document.getElementById("stopBtn");
    const bargeBtn = document.getElementById("bargeBtn");
    const clearBtn = document.getElementById("clearBtn");

    let interruptTimer = null;
    let speakingTimer = null;
    let currentUtterance = null;
    let messageSeq = 0;

    function nowLabel() {
      return new Date().toLocaleTimeString("zh-CN", { hour12: false });
    }

    function log(tag, data = {}) {
      const row = document.createElement("div");
      row.className = "log-row";
      row.textContent = `${nowLabel()} ${tag} ${JSON.stringify(data)}`;
      logEl.prepend(row);
      while (logEl.children.length > 120) logEl.removeChild(logEl.lastChild);
      console.log(tag, data);
    }

    function setState(next, reason) {
      if (context.state === next) return;
      const prev = context.state;
      context.state = next;
      statePillEl.textContent = next;
      log("[STATE]", { prev, next, reason });
      renderDebug();
    }

    function setAgent(name, status, detail = "") {
      context.agents[name] = { status, detail };
      renderAgentLanes();
      renderDebug();
    }

    function addMessage(role, text, status = "done") {
      const msg = {
        id: `m-${++messageSeq}`,
        role,
        text,
        status,
        time: nowLabel(),
      };
      context.messages.push(msg);
      renderMessages();
      return msg.id;
    }

    function updateMessage(id, patch) {
      const msg = context.messages.find((item) => item.id === id);
      if (!msg) return;
      Object.assign(msg, patch);
      renderMessages();
    }

    function renderMessages() {
      timelineEl.innerHTML = "";
      for (const msg of context.messages) {
        const node = document.createElement("article");
        node.className = `message ${msg.role} ${msg.status === "interrupted" ? "interrupted" : ""}`;
        node.innerHTML = `
          <div class="meta">
            <span>${msg.role === "user" ? "User" : "Assistant"}</span>
            <span>${msg.status} · ${msg.time}</span>
          </div>
          <div class="text">${escapeHtml(msg.text || "")}</div>
        `;
        timelineEl.appendChild(node);
      }
      timelineEl.scrollTop = timelineEl.scrollHeight;
    }

    function renderAgentLanes() {
      const lanes = [
        {
          key: "main",
          title: "主 Agent",
          subtitle: "ASR final -> reply planning",
        },
        {
          key: "interrupt",
          title: "打断子 Agent",
          subtitle: "partial/pause -> backchannel or barge-in",
        },
        {
          key: "playback",
          title: "播放控制器",
          subtitle: "TTS start/stop",
        },
      ];
      agentLanesEl.innerHTML = lanes.map((lane) => {
        const agent = context.agents[lane.key];
        const level = laneClass(agent.status);
        return `
          <div class="agent-lane ${level}">
            <div class="agent-head">
              <span>${lane.title}</span>
              <span class="agent-status">${escapeHtml(agent.status)}</span>
            </div>
            <div class="agent-detail">${escapeHtml(agent.detail || lane.subtitle)}</div>
          </div>
        `;
      }).join("");
    }

    function laneClass(status) {
      if (["drafting", "thinking", "speaking", "backchannel", "soft_take_floor", "hard_take_floor"].includes(status)) return "active";
      if (["watching", "queued", "evaluating", "reply-ready"].includes(status)) return "warn";
      if (["interrupted", "barge-in", "stopped", "stop_assistant"].includes(status)) return "danger";
      return "";
    }

    function renderDebug() {
      const pauseMs = context.lastPartialAt ? Date.now() - context.lastPartialAt : 0;
      const rows = {
        state: context.state,
        floorOwner: context.floorOwner,
        userSpeaking: context.userSpeaking,
        assistantSpeaking: context.assistantSpeaking,
        mainAgent: context.agents.main.status,
        interruptAgent: context.agents.interrupt.status,
        playbackAgent: context.agents.playback.status,
        currentTurnId: context.currentTurnId || "-",
        latestPartial: context.latestPartial || "-",
        latestFinal: context.latestFinal || "-",
        intent: context.currentDraft.intentHypothesis || "-",
        confidence: context.currentDraft.intentConfidence.toFixed(2),
        candidateType: context.lastFloorDecision.candidateType || "-",
        decision: context.lastFloorDecision.action || "-",
        reason: context.lastFloorDecision.reason || "-",
        draft: context.responseDraft || "-",
        pendingReply: context.pendingReply ? context.pendingReply[0] : "-",
        pauseMs,
        cooldown: Date.now() < context.cooldownUntil,
        activeTtsTurnId: context.activeTtsTurnId || "-",
      };
      debugEl.innerHTML = Object.entries(rows)
        .map(([key, value]) => `<div><span>${key}</span><strong>${escapeHtml(String(value))}</strong></div>`)
        .join("");
      renderAgentLanes();
    }

    function escapeHtml(value) {
      return value
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }

    function emptyDraft() {
      return {
        intentHypothesis: "",
        intentConfidence: 0,
        shortReplyCandidate: "",
        clarificationCandidate: "",
        roughFullReplyCandidate: "",
        missingSlots: [],
        isCorrection: false,
      };
    }

    function emptyDecision(reason = "keep_listening") {
      return {
        action: "no_interrupt",
        reason,
        confidence: 0,
        priority: 0,
        candidateText: "",
        candidateType: "none",
        shouldStopTts: false,
        shouldReplan: false,
      };
    }

    function draftFromPartial(text) {
      const t = text.trim();
      if (!t) return emptyDraft();

      if (["不是", "不对", "等一下", "你先停", "先停", "错了", "纠正"].some((word) => t.includes(word))) {
        return {
          intentHypothesis: "user_correction",
          intentConfidence: 0.9,
          shortReplyCandidate: "好，我先停一下，刚才那个理解可能不对。",
          clarificationCandidate: "你纠正的是地点、时间，还是我刚才的结论？",
          roughFullReplyCandidate: "我会按你最新纠正的信息重新回答。",
          missingSlots: [],
          isCorrection: true,
        };
      }

      if (t.includes("天气")) {
        const cityWords = ["北京", "上海", "广州", "深圳", "杭州"];
        const timeWords = ["今天", "明天", "后天", "周末"];
        const city = cityWords.find((word) => t.includes(word)) || "这个城市";
        const timeWord = timeWords.find((word) => t.includes(word)) || "对应时间";
        const missingSlots = [];
        if (city === "这个城市") missingSlots.push("city");
        if (timeWord === "对应时间") missingSlots.push("time");
        return {
          intentHypothesis: "weather_query",
          intentConfidence: missingSlots.length ? 0.62 : 0.84,
          shortReplyCandidate: `${city}${timeWord}的天气我可以直接帮你看。`,
          clarificationCandidate: weatherClarification(missingSlots),
          roughFullReplyCandidate: `${city}${timeWord}大概率天气不错，我会补充温度和出行建议。`,
          missingSlots,
          isCorrection: false,
        };
      }

      if (["怎么", "如何", "实现", "架构", "并行", "系统"].some((word) => t.includes(word))) {
        return {
          intentHypothesis: "architecture_explanation",
          intentConfidence: t.length >= 10 ? 0.78 : 0.55,
          shortReplyCandidate: "可以，我先直接说结论。",
          clarificationCandidate: "你想听整体架构，还是先看打断链路？",
          roughFullReplyCandidate: "这个系统应该把主回复链路和抢话决策链路拆开，让它们通过共享上下文并行工作。",
          missingSlots: [],
          isCorrection: false,
        };
      }

      if (["自我介绍", "你是谁", "介绍一下"].some((word) => t.includes(word))) {
        return {
          intentHypothesis: "assistant_intro",
          intentConfidence: 0.82,
          shortReplyCandidate: "好，我明白了，你想让我介绍自己。",
          clarificationCandidate: "",
          roughFullReplyCandidate: "我是一个用于验证实时抢话和可被打断能力的语音助手 demo。",
          missingSlots: [],
          isCorrection: false,
        };
      }

      return {
        intentHypothesis: "general_query",
        intentConfidence: Math.min(0.35 + t.length / 40, 0.68),
        shortReplyCandidate: "嗯，我大概明白你的方向了。",
        clarificationCandidate: "你希望我先回答结论，还是展开解释？",
        roughFullReplyCandidate: `我理解你的问题和这段内容有关：${t}`,
        missingSlots: [],
        isCorrection: false,
      };
    }

    function weatherClarification(missingSlots) {
      if (missingSlots.includes("city") && missingSlots.includes("time")) return "你是想问哪个城市、今天还是明天？";
      if (missingSlots.includes("city")) return "你是想问北京还是上海，或者其他城市？";
      if (missingSlots.includes("time")) return "你问的是今天还是明天？";
      return "我先确认一下，你是在问天气对吗？";
    }

    function finalReply(text) {
      const draft = context.currentDraft;
      if (draft.intentHypothesis === "weather_query") {
        const city = ["北京", "上海", "广州", "深圳", "杭州"].find((word) => text.includes(word)) || "你说的城市";
        const timeWord = ["今天", "明天", "后天", "周末"].find((word) => text.includes(word)) || "那个时间";
        return `${city}${timeWord}我先按 mock 结果回答：天气偏晴，适合出门。我会建议你再确认一下实时天气。`;
      }
      if (draft.intentHypothesis === "architecture_explanation") {
        return "结论是：主回复链路负责理解和生成候选，抢话链路独立评估 partial、停顿和纠正词。Orchestrator 只负责批准话轮切换和停止播放。";
      }
      if (draft.intentHypothesis === "assistant_intro") {
        return "我是一个实验型 voice assistant demo，重点不是模型多聪明，而是验证我能在 partial 阶段草拟、主动抢话，并且被用户打断后立刻重规划。";
      }
      if (draft.intentHypothesis === "user_correction") {
        return "收到，我会以你刚才纠正的内容为准，停止沿用之前的理解，然后重新组织回答。";
      }
      return `收到，我按你的完整输入来回答：${text}`;
    }

    function dispatch(type, turnId, payload = {}) {
      if (!context.running && type !== "input_finished") return;
      const event = { type, turnId, payload, timestamp: Date.now() };
      handleEvent(event);
    }

    function handleEvent(event) {
      switch (event.type) {
        case "user_speech_started":
          onUserSpeechStarted(event);
          break;
        case "user_speech_stopped":
          onUserSpeechStopped(event);
          break;
        case "partial_transcript":
          onPartial(event);
          break;
        case "final_transcript":
          onFinal(event);
          break;
        case "input_finished":
          context.inputFinished = true;
          log("[INPUT FINISHED]");
          break;
      }
      renderDebug();
    }

    function onUserSpeechStarted(event) {
      context.currentTurnId = event.turnId;
      context.userSpeaking = true;
      context.floorOwner = "user";
      context.latestPartial = "";
      context.latestFinal = "";
      context.currentDraft = emptyDraft();
      liveEl.innerHTML = "Live transcript: <strong>...</strong>";
      log("[TURN START]", { turnId: event.turnId });
      setAgent("main", "listening", `等待 ${event.turnId} 的 final transcript`);
      setAgent("interrupt", "watching", "用户开始说话，监听 partial 和停顿");

      if (context.assistantSpeaking) {
        handleFloorDecision({
          action: "stop_assistant",
          reason: "speech_started_while_assistant_speaking",
          confidence: 0.96,
          priority: 105,
          candidateText: "",
          candidateType: "none",
          shouldStopTts: true,
          shouldReplan: true,
        });
      }
      setState("user_speaking", "user_speech_started");
    }

    function onUserSpeechStopped(event) {
      context.userSpeaking = false;
      log("[ASR speech stopped]", { turnId: event.turnId });
      setAgent("interrupt", "idle", "用户停止说话，等待下一轮 partial");
      setState("user_paused", "user_speech_stopped");
      maybeSpeakPending();
    }

    function onPartial(event) {
      const text = (event.payload.text || "").trim();
      if (!text) return;
      context.currentTurnId = event.turnId;
      context.latestPartial = text;
      context.lastPartialAt = Date.now();
      liveEl.innerHTML = `Live transcript: <strong>${escapeHtml(text)}</strong>`;
      log("[ASR partial received]", { turnId: event.turnId, text });

      const draft = draftFromPartial(text);
      context.currentDraft = draft;
      context.responseDraft = draft.shortReplyCandidate || draft.roughFullReplyCandidate;
      setAgent("main", "drafting", `${draft.intentHypothesis} ${draft.intentConfidence.toFixed(2)} · ${context.responseDraft}`);
      log("[Intent hypothesis updated]", {
        turnId: event.turnId,
        intent: draft.intentHypothesis,
        confidence: draft.intentConfidence,
        missingSlots: draft.missingSlots,
      });
      log("[Dialogue draft updated]", {
        turnId: event.turnId,
        short: draft.shortReplyCandidate,
        clarify: draft.clarificationCandidate,
        roughFull: draft.roughFullReplyCandidate,
      });
      setAgent("interrupt", "evaluating", `partial=${text.slice(0, 28)}`);
      evaluateFloorTaking();
    }

    function onFinal(event) {
      const text = (event.payload.text || "").trim();
      if (!text) return;
      context.latestFinal = text;
      liveEl.innerHTML = `Live transcript: <strong>${escapeHtml(text)}</strong>`;
      addMessage("user", text);
      log("[ASR final received]", { turnId: event.turnId, text });
      setState("assistant_preparing", "final_transcript");
      setAgent("main", "thinking", "final transcript 到达，生成完整回复");

      window.setTimeout(() => {
        const reply = finalReply(text);
        context.currentResponseText = reply;
        log("[Dialogue final reply]", { turnId: event.turnId, reply });
        setAgent("main", "reply-ready", reply);
        startAssistantReply(event.turnId, reply);
      }, 180);
    }

    function evaluateFloorTaking() {
      const pauseMs = context.lastPartialAt ? Date.now() - context.lastPartialAt : 0;
      const decision = floorTakingPolicy(pauseMs);
      context.lastFloorDecision = decision;

      if (decision.action === "no_interrupt") {
        return;
      }

      const decisionKey = `${context.currentTurnId}:${decision.action}:${decision.reason}:${decision.candidateType}`;
      if (decisionKey === context.lastDecisionKey) return;
      context.lastDecisionKey = decisionKey;
      handleFloorDecision(decision);
    }

    function floorTakingPolicy(pauseMs) {
      const draft = context.currentDraft;

      if (bargeInPolicy()) {
        return {
          action: "stop_assistant",
          reason: "user_barge_in_while_assistant_speaking",
          confidence: 0.98,
          priority: 100,
          candidateText: "",
          candidateType: "none",
          shouldStopTts: true,
          shouldReplan: true,
        };
      }

      if (!context.userSpeaking) return emptyDecision("user_not_speaking");
      if (context.assistantSpeaking) return emptyDecision("assistant_already_speaking");
      if (Date.now() < context.cooldownUntil) return emptyDecision("cooldown_active");
      if (context.takenFloorTurns.has(context.currentTurnId)) return emptyDecision("floor_already_taken_for_turn");
      if (context.latestPartial.trim().length < 4) return emptyDecision("partial_too_short");

      if (draft.isCorrection && pauseMs >= settings.hardTakeFloorPauseMs) {
        return {
          action: "hard_take_floor",
          reason: "correction_detected",
          confidence: Math.max(draft.intentConfidence, 0.9),
          priority: 95,
          candidateText: draft.shortReplyCandidate,
          candidateType: "corrective",
          shouldStopTts: false,
          shouldReplan: true,
        };
      }

      if (draft.missingSlots.length && draft.clarificationCandidate && pauseMs >= settings.clarifyPauseMs) {
        return {
          action: "soft_take_floor",
          reason: `missing_slots:${draft.missingSlots.join(",")}`,
          confidence: Math.max(draft.intentConfidence, 0.68),
          priority: 74,
          candidateText: draft.clarificationCandidate,
          candidateType: "clarify",
          shouldStopTts: false,
          shouldReplan: false,
        };
      }

      if (
        draft.intentConfidence >= settings.softTakeFloorMinConfidence &&
        draft.shortReplyCandidate &&
        pauseMs >= settings.softTakeFloorPauseMs
      ) {
        return {
          action: "soft_take_floor",
          reason: "high_confidence_intent_with_user_pause",
          confidence: draft.intentConfidence,
          priority: 70,
          candidateText: draft.shortReplyCandidate,
          candidateType: "short",
          shouldStopTts: false,
          shouldReplan: false,
        };
      }

      if (
        pauseMs >= settings.backchannelPauseMinMs &&
        pauseMs <= settings.backchannelPauseMaxMs &&
        draft.intentConfidence >= settings.backchannelMinConfidence &&
        !context.seenBackchannelTurns.has(context.currentTurnId)
      ) {
        return {
          action: "backchannel",
          reason: "short_pause_keep_user_floor",
          confidence: Math.min(draft.intentConfidence, 0.64),
          priority: 35,
          candidateText: "嗯，我在听，你继续。",
          candidateType: "short",
          shouldStopTts: false,
          shouldReplan: false,
        };
      }

      return emptyDecision("policy_conditions_not_met");
    }

    function bargeInPolicy() {
      if (context.activeTtsTurnId.endsWith("-backchannel")) return false;
      if (context.activeTtsTurnId.endsWith("-short")) return false;
      if (context.activeTtsTurnId.endsWith("-clarify")) return false;
      if (context.activeTtsTurnId.endsWith("-corrective")) return false;
      return context.assistantSpeaking && context.userSpeaking && context.latestPartial.trim().length >= settings.bargeInTextMinLen;
    }

    function handleFloorDecision(decision) {
      context.lastFloorDecision = decision;
      log("[Floor-taking decision emitted]", {
        turnId: context.currentTurnId,
        decision,
      });
      setAgent("interrupt", decision.action, `${decision.candidateType}: ${decision.reason}`);

      if (decision.shouldStopTts) {
        log("[Turn revoked from assistant]", { turnId: context.currentTurnId, reason: decision.reason });
        interruptCurrentTurn(decision.reason);
        if (decision.shouldReplan) {
          log("[Replan requested]", { turnId: context.currentTurnId, reason: decision.reason, latestPartial: context.latestPartial });
        }
        return;
      }

      if (!decision.candidateText || context.assistantSpeaking) return;

      if (decision.action === "backchannel") {
        context.seenBackchannelTurns.add(context.currentTurnId);
        context.cooldownUntil = Date.now() + settings.proactiveCooldownMs;
        const messageId = addMessage("assistant", decision.candidateText, "backchannel");
        log("[Turn granted to assistant]", {
          type: "backchannel",
          turnId: context.currentTurnId,
          reason: decision.reason,
          candidateType: decision.candidateType,
          text: decision.candidateText,
        });
        speak(`${context.currentTurnId}-backchannel`, decision.candidateText, { backchannel: true, messageId });
        return;
      }

      if (decision.action === "soft_take_floor" || decision.action === "hard_take_floor") {
        context.takenFloorTurns.add(context.currentTurnId);
        context.cooldownUntil = Date.now() + settings.proactiveCooldownMs;
        context.floorOwner = "assistant";
        setState("assistant_preparing", decision.reason);
        log("[Turn granted to assistant]", {
          type: decision.action,
          turnId: context.currentTurnId,
          reason: decision.reason,
          candidateType: decision.candidateType,
          confidence: decision.confidence,
          text: decision.candidateText,
        });
        const messageId = addMessage("assistant", decision.candidateText, decision.candidateType);
        speak(`${context.currentTurnId}-${decision.candidateType}`, decision.candidateText, { floorTaking: true, messageId });
      }
    }

    function startAssistantReply(turnId, reply) {
      context.activeAssistantMessageId = addMessage("assistant", reply, "speaking");
      if (context.userSpeaking || context.assistantSpeaking) {
        context.pendingReply = [turnId, reply];
        setAgent("main", "queued", "完整回复等待话轮释放");
        log("[Replan requested]", { turnId, reason: "full_reply_waits_for_floor", owner: context.floorOwner });
        return;
      }
      log("[Turn granted to assistant]", { type: "full_reply", turnId });
      context.floorOwner = "assistant";
      speak(turnId, reply);
    }

    function maybeSpeakPending() {
      if (!context.pendingReply || context.assistantSpeaking || context.userSpeaking) return;
      const [turnId, reply] = context.pendingReply;
      context.pendingReply = null;
      setAgent("main", "reply-ready", "用户停顿后释放暂存回复");
      log("[Turn granted to assistant]", { type: "full_reply", turnId, reason: "user_speech_stopped_or_tts_finished" });
      context.floorOwner = "assistant";
      speak(turnId, reply);
    }

    function speak(turnId, text, options = {}) {
      stopSpeechOnly("preempt");
      context.assistantSpeaking = true;
      context.activeTtsTurnId = turnId;
      context.floorOwner = "assistant";
      setAgent("playback", options.backchannel ? "backchannel" : "speaking", text);
      log("[TTS START]", { turnId, text });
      setState("assistant_speaking", "tts_started");

      if ("speechSynthesis" in window) {
        currentUtterance = new SpeechSynthesisUtterance(text);
        currentUtterance.lang = "zh-CN";
        currentUtterance.rate = 1.04;
        currentUtterance.onend = () => finishSpeak(turnId, false, options);
        currentUtterance.onerror = () => finishSpeak(turnId, true, options);
        speechSynthesis.speak(currentUtterance);
      } else {
        const duration = Math.max(800, text.length * 115);
        speakingTimer = window.setTimeout(() => finishSpeak(turnId, false, options), duration);
      }
    }

    function finishSpeak(turnId, interrupted, options = {}) {
      if (context.activeTtsTurnId !== turnId) return;
      context.assistantSpeaking = false;
      context.activeTtsTurnId = "";
      currentUtterance = null;
      if (speakingTimer) {
        clearTimeout(speakingTimer);
        speakingTimer = null;
      }
      log("[TTS FINISHED]", { turnId, interrupted });
      setAgent("playback", interrupted ? "stopped" : "idle", interrupted ? "播报被中断" : "播报完成");
      if (options.messageId) {
        updateMessage(options.messageId, { status: interrupted ? "interrupted" : "done" });
      }
      if (!options.backchannel && !options.floorTaking && context.activeAssistantMessageId) {
        updateMessage(context.activeAssistantMessageId, { status: interrupted ? "interrupted" : "done" });
      }
      if (interrupted) {
        setState("replanning", "tts_interrupted");
      } else if (context.userSpeaking) {
        context.floorOwner = "user";
        setState("user_speaking", "tts_done_user_speaking");
      } else {
        context.floorOwner = "none";
        setState("idle", "tts_done");
      }
      maybeSpeakPending();
      renderDebug();
    }

    function interruptCurrentTurn(reason) {
      log("[INTERRUPT]", { reason, turnId: context.activeTtsTurnId || context.currentTurnId });
      setAgent("interrupt", "barge-in", reason);
      setAgent("playback", "stopped", "收到 interruptCurrentTurn");
      stopSpeechOnly(reason);
      if (context.activeAssistantMessageId) {
        updateMessage(context.activeAssistantMessageId, { status: "interrupted" });
      }
      setState("interrupted", reason);
      context.assistantSpeaking = false;
      context.activeTtsTurnId = "";
      context.floorOwner = "user";
      setState("replanning", `interrupt:${reason}`);
    }

    function stopSpeechOnly(reason) {
      if (speakingTimer) {
        clearTimeout(speakingTimer);
        speakingTimer = null;
      }
      if ("speechSynthesis" in window) {
        speechSynthesis.cancel();
      }
      if (context.assistantSpeaking) {
        setAgent("playback", "stopped", reason);
        log("[STOP TTS]", { reason, turnId: context.activeTtsTurnId });
      }
    }

    function runScenario(name) {
      stopAll(false);
      context.running = true;
      context.selectedScenario = name;
      context.inputFinished = false;
      context.floorOwner = "none";
      context.currentDraft = emptyDraft();
      context.lastFloorDecision = emptyDecision("scenario_start");
      context.lastDecisionKey = "";
      context.seenBackchannelTurns.clear();
      context.takenFloorTurns.clear();
      setAgent("main", "idle", "等待 ASR final");
      setAgent("interrupt", "watching", "监听 partial 和停顿");
      setAgent("playback", "idle", "等待播报任务");
      setState("listening", "scenario_start");
      const script = name === "all"
        ? buildAllScenario()
        : scenarios[name];

      let elapsed = 0;
      for (const [delay, type, turnId, payload] of script) {
        elapsed += delay;
        const timer = window.setTimeout(() => dispatch(type, turnId, payload), elapsed);
        context.timers.push(timer);
      }
      context.timers.push(window.setTimeout(() => dispatch("input_finished", "system", {}), elapsed + 250));
      log("[INPUT START]", { scenario: name });
      interruptTimer = window.setInterval(() => {
        evaluateFloorTaking();
        renderDebug();
      }, 250);
    }

    function buildAllScenario() {
      const order = ["1", "2", "3", "4", "5"];
      const out = [];
      for (const [index, key] of order.entries()) {
        const script = scenarios[key].map((step) => [...step]);
        if (index > 0) script[0][0] += 7000;
        out.push(...script);
      }
      return out;
    }

    function stopAll(clearMessages = false) {
      context.running = false;
      for (const timer of context.timers) clearTimeout(timer);
      context.timers = [];
      if (interruptTimer) {
        clearInterval(interruptTimer);
        interruptTimer = null;
      }
      stopSpeechOnly("stop_all");
      context.userSpeaking = false;
      context.assistantSpeaking = false;
      context.activeTtsTurnId = "";
      context.pendingReply = null;
      context.floorOwner = "none";
      context.currentDraft = emptyDraft();
      context.lastFloorDecision = emptyDecision("stop_all");
      context.lastDecisionKey = "";
      context.latestPartial = "";
      context.latestFinal = "";
      context.seenBackchannelTurns.clear();
      context.takenFloorTurns.clear();
      setAgent("main", "idle", "已停止");
      setAgent("interrupt", "idle", "已停止");
      setAgent("playback", "idle", "已停止");
      liveEl.innerHTML = "Live transcript: <strong>等待开始</strong>";
      if (clearMessages) {
        context.messages = [];
        context.activeAssistantMessageId = "";
        logEl.innerHTML = "";
        renderMessages();
      }
      setState("idle", "stop_all");
      renderDebug();
    }

    document.querySelectorAll(".scenario-bar button").forEach((button) => {
      button.addEventListener("click", () => {
        document.querySelectorAll(".scenario-bar button").forEach((item) => item.classList.remove("active"));
        button.classList.add("active");
        context.selectedScenario = button.dataset.scenario;
        renderDebug();
      });
    });

    startBtn.addEventListener("click", () => runScenario(context.selectedScenario));
    stopBtn.addEventListener("click", () => stopAll(false));
    clearBtn.addEventListener("click", () => stopAll(true));
    bargeBtn.addEventListener("click", () => {
      const turn = `manual-${Date.now()}`;
      dispatch("user_speech_started", turn, {});
      window.setTimeout(() => dispatch("partial_transcript", turn, { text: "等等我想换个说法" }), 120);
      window.setTimeout(() => dispatch("final_transcript", turn, { text: "等等我想换个说法" }), 360);
      window.setTimeout(() => dispatch("user_speech_stopped", turn, {}), 430);
    });

    renderMessages();
    renderDebug();
  </script>
</body>
</html>
