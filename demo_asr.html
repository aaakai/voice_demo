<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Voice agents console demo</title>
  <style>
    :root {
      --bg: #eef1f5;
      --card: #ffffff;
      --line: #dde3ea;
      --text: #0f1720;
      --muted: #6c7888;
      --user-bg: #e8f1ff;
      --assistant-bg: #f5f7fa;
      --assistant-border: #ced7e2;
      --accent: #1f6fff;
      --accent-soft: #dce8ff;
      --danger: #c93838;
      --shadow: 0 10px 30px rgba(15, 23, 32, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", "PingFang SC", "Noto Sans SC", sans-serif;
      background: radial-gradient(circle at 20% 0%, #f7f9fc 0%, var(--bg) 46%, #e9edf3 100%);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .shell {
      width: min(980px, 100%);
      height: min(90vh, 860px);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: var(--shadow);
      display: grid;
      grid-template-rows: auto 1fr auto auto;
      overflow: hidden;
    }

    .top {
      border-bottom: 1px solid var(--line);
      padding: 18px 24px 14px;
      background: linear-gradient(180deg, #ffffff 0%, #fafcff 100%);
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    .title {
      font-size: 24px;
      font-weight: 650;
      letter-spacing: 0.2px;
      margin: 0;
    }

    .subtitle {
      color: var(--muted);
      margin: 0;
      font-size: 13px;
    }

    .tab {
      border: 1px solid #bfd2fb;
      background: var(--accent-soft);
      color: #1848a8;
      border-radius: 999px;
      padding: 7px 14px;
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
    }

    .live-strip {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 10px;
      align-items: start;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px 12px;
      background: #fbfdff;
    }

    .live-label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      margin-top: 2px;
    }

    .live-text {
      min-height: 18px;
      color: #2a3645;
      font-size: 14px;
      word-break: break-word;
      white-space: pre-wrap;
    }

    .timeline {
      overflow-y: auto;
      padding: 18px 22px 14px;
      background: linear-gradient(180deg, #fcfdff 0%, #f9fbff 100%);
    }

    .messages {
      list-style: none;
      margin: 0;
      padding: 0;
      display: grid;
      gap: 12px;
    }

    .msg-row { display: flex; }
    .msg-row.user { justify-content: flex-end; }
    .msg-row.assistant { justify-content: flex-start; }

    .msg {
      max-width: min(78%, 720px);
      border-radius: 14px;
      padding: 10px 12px;
      border: 1px solid transparent;
      word-break: break-word;
      box-shadow: 0 1px 0 rgba(15, 23, 32, 0.04);
    }

    .msg.user {
      background: var(--user-bg);
      border-color: #cfe1ff;
    }

    .msg.assistant {
      background: var(--assistant-bg);
      border-color: var(--assistant-border);
    }

    .meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .speaker {
      color: #334155;
      font-weight: 600;
    }

    .status-pill {
      font-size: 11px;
      border-radius: 999px;
      padding: 2px 8px;
      border: 1px solid #d6deea;
      background: #fff;
      color: #66758b;
    }

    .status-pill.streaming { border-color: #acd0ff; color: #1f5ec7; background: #ebf3ff; }
    .status-pill.speaking { border-color: #9ec2ff; color: #1848a8; background: #dfebff; }
    .status-pill.done { border-color: #cfd8e5; color: #5f6f85; background: #f6f8fb; }
    .status-pill.interrupted { border-color: #f0c1c1; color: var(--danger); background: #fff2f2; }

    .body {
      font-size: 14px;
      line-height: 1.55;
      color: #1d2837;
      white-space: pre-wrap;
    }

    .controls {
      border-top: 1px solid var(--line);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      background: #ffffff;
    }

    .stat {
      border: 1px solid var(--line);
      background: #f9fbfe;
      border-radius: 10px;
      padding: 8px 10px;
      min-width: 128px;
    }

    .stat-key {
      display: block;
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      margin-bottom: 2px;
    }

    .stat-val {
      font-size: 13px;
      color: #1f2d3d;
      font-weight: 600;
      word-break: break-all;
    }

    .spacer { flex: 1; min-width: 10px; }

    button {
      border-radius: 10px;
      border: 1px solid #cdd6e3;
      background: #fff;
      color: #233245;
      font-size: 13px;
      font-weight: 600;
      padding: 9px 14px;
      cursor: pointer;
    }

    button:hover { background: #f6f9ff; }

    .btn-start { background: var(--accent); color: #fff; border-color: var(--accent); }
    .btn-start:hover { background: #1a5edf; }

    .btn-stop {
      color: #912f2f;
      border-color: #e6bbbb;
      background: #fff6f6;
    }

    .debug-wrap {
      border-top: 1px solid var(--line);
      padding: 8px 12px 12px;
      background: #f8fafc;
    }

    details {
      border: 1px dashed #cfd8e4;
      border-radius: 10px;
      background: #fcfdff;
      padding: 6px 8px;
    }

    summary {
      cursor: pointer;
      color: #52627a;
      font-size: 12px;
      font-weight: 600;
      outline: none;
      user-select: none;
    }

    .debug-grid {
      margin-top: 8px;
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
    }

    .debug-card {
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      background: #fff;
      overflow: hidden;
    }

    .debug-head {
      background: #f2f6fb;
      color: #51627a;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.3px;
      text-transform: uppercase;
      padding: 6px 8px;
      border-bottom: 1px solid #e2e8f0;
    }

    .debug-body {
      margin: 0;
      padding: 8px;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 12px;
      color: #324258;
      line-height: 1.45;
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 160px;
      overflow: auto;
    }

    .empty {
      text-align: center;
      color: #7b8797;
      font-size: 13px;
      border: 1px dashed #d4dbe7;
      border-radius: 12px;
      padding: 26px 10px;
      background: #ffffff;
    }

    @media (max-width: 780px) {
      body { padding: 10px; }
      .shell { height: 95vh; border-radius: 16px; }
      .title { font-size: 20px; }
      .msg { max-width: 92%; }
      .stat { min-width: calc(50% - 8px); }
      .controls { padding: 12px; }
      .top { padding: 14px 14px 10px; }
      .timeline { padding: 12px; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header class="top">
      <div class="topbar">
        <div>
          <h1 class="title">Voice agents</h1>
          <p class="subtitle">Realtime voice interaction demo</p>
        </div>
        <div class="tab">Voice agents</div>
      </div>
      <div class="live-strip">
        <div class="live-label">Live transcript</div>
        <div class="live-text" id="liveTranscript">-</div>
      </div>
    </header>

    <section class="timeline" id="timeline">
      <ul class="messages" id="messages"></ul>
      <div class="empty" id="emptyHint">点击 Start Listening 后开始说话，assistant 会边生成边播报。</div>
    </section>

    <section class="controls">
      <div class="stat">
        <span class="stat-key">Session</span>
        <span class="stat-val" id="sessionTimer">00:00</span>
      </div>
      <div class="stat">
        <span class="stat-key">Mic</span>
        <span class="stat-val" id="micState">idle</span>
      </div>
      <div class="stat">
        <span class="stat-key">Playback</span>
        <span class="stat-val" id="playbackState">idle</span>
      </div>
      <div class="stat" style="min-width:200px;">
        <span class="stat-key">Turn ID</span>
        <span class="stat-val" id="turnState">-</span>
      </div>
      <div class="spacer"></div>
      <button class="btn-start" id="startBtn">Start Listening</button>
      <button class="btn-stop" id="stopBtn">Stop</button>
      <button id="clearBtn">Clear</button>
    </section>

    <section class="debug-wrap">
      <details>
        <summary>Debug</summary>
        <div class="debug-grid">
          <div class="debug-card">
            <div class="debug-head">Last /decide</div>
            <pre class="debug-body" id="decideDebug">{}</pre>
          </div>
          <div class="debug-card">
            <div class="debug-head">Stream status</div>
            <pre class="debug-body" id="streamDebug">{}</pre>
          </div>
          <div class="debug-card">
            <div class="debug-head">Agent state</div>
            <pre class="debug-body" id="agentDebug">{}</pre>
          </div>
        </div>
      </details>
    </section>
  </main>

  <script>
    const liveTranscriptEl = document.getElementById("liveTranscript");
    const messagesEl = document.getElementById("messages");
    const emptyHintEl = document.getElementById("emptyHint");
    const timelineEl = document.getElementById("timeline");

    const startBtn = document.getElementById("startBtn");
    const stopBtn = document.getElementById("stopBtn");
    const clearBtn = document.getElementById("clearBtn");

    const sessionTimerEl = document.getElementById("sessionTimer");
    const micStateEl = document.getElementById("micState");
    const playbackStateEl = document.getElementById("playbackState");
    const turnStateEl = document.getElementById("turnState");

    const decideDebugEl = document.getElementById("decideDebug");
    const streamDebugEl = document.getElementById("streamDebug");
    const agentDebugEl = document.getElementById("agentDebug");

    const API_BASE = "http://127.0.0.1:8000";
    const OPENAI_REALTIME_CALLS_URL = "https://api.openai.com/v1/realtime/calls";
    const DEEPGRAM_API_KEY = "3ec3198b194bb464cb82aa5f8cbd99b36e4db49a";
    const DEEPGRAM_URL =
      "wss://api.deepgram.com/v1/listen?model=nova-3&language=zh-CN&interim_results=true&endpointing=1000&encoding=linear16&sample_rate=16000&smart_format=true&punctuate=true&diarize=false";
    const DEEPGRAM_TARGET_SAMPLE_RATE = 16000;
    const DEEPGRAM_CHUNK_MS = 60; // 20ms~100ms
    const DEEPGRAM_CHUNK_BYTES = Math.floor((DEEPGRAM_TARGET_SAMPLE_RATE * 2 * DEEPGRAM_CHUNK_MS) / 1000);
    const DEEPGRAM_VAD_RMS_THRESHOLD = 0.006;

    let sessionId = "web-demo-s1";
    let messages = [];

    let currentStreamController = null;
    let currentTurnId = null;
    let currentTurnActive = false;
    let activeAssistantMessageId = null;
    let activeUserMessageId = null;
    let activeUserMessageText = "";
    let activeUserMessageTurnSeq = 0;
    let conversationMode = "chat";
    let storyAutoContinueCount = 0;
    const STORY_AUTO_CONTINUE_MAX = 2;
    const ENABLE_BACKCHANNEL = true;

    // TTS text buffer + PCM streaming playback
    let assistantSpeaking = false;
    let playbackStage = "idle";
    let ttsTextBuffer = "";
    let ttsBufferTurnId = null;
    let ttsFlushTimer = null;
    let lastTtsFlushText = "";
    let pendingTtsRequestsCount = 0;
    let pendingTtsControllers = [];
    let lastAudioChunkSize = 0;

    let audioCtx = null;
    let pcmQueue = [];
    let pcmQueueScheduling = false;
    let pcmPlaying = false;
    let pcmCurrentTurnId = null;
    let pcmNextPlayTime = 0;
    let activePcmSources = [];

    // Realtime connection state
    let shouldKeepListening = false;
    let recognitionRunning = false;
    let recognitionStarting = false;
    let recognitionState = "idle";
    let rtcRestartTimer = null;

    let rtcPc = null;
    let rtcDc = null;
    let deepgramWs = null;
    let deepgramTurnCounter = 0;
    let deepgramCurrentItemId = null;
    let deepgramAudioByteBuffer = new Uint8Array(0);
    let deepgramReconnectTimer = null;
    let deepgramFinalizeTimer = null;
    let micStream = null;
    let micCaptureCtx = null;
    let micCaptureSource = null;
    let micCaptureProcessor = null;
    let micRingBuffer = null;
    let micRingBufferSize = 0;
    let micRingWriteIndex = 0;
    let micRingFilled = false;
    let micCaptureSampleRate = 0;
    let lastAudioChunkDurationMs = 0;
    let remoteAudioEl = null;
    let realtimeModel = "gpt-realtime";

    // transcript buffer per turn
    let currentTranscript = "";
    let currentCompletedTranscript = "";
    let lastFinalizeSource = "none";
    let activeInputItemId = null;

    // anti-echo interrupt guards
    let pendingInterrupt = false;
    let pendingInterruptStartedAt = 0;
    let interruptCandidateTranscript = "";
    let recentAssistantText = "";
    let ignoreEchoUntil = 0;

    // NEW: backchannel engine state
    let userSpeaking = false;
    let lastSpeechStartedAt = 0;
    let lastTranscriptUpdateAt = 0;
    let activeUserTranscript = "";
    let assistantInterjectCooldownUntil = 0;
    let partialTranscript = "";
    let partialTurnConsumed = false;
    let partialTurnTakeoverUsed = false;
    let lastTakeoverAt = 0;
    const ASSISTANT_INTERJECT_COOLDOWN_MS = 4000;
    let pauseMs = 0;
    let lastInterruptDecision = { action: "none", reason: "init", reply_text: "" };
    let interruptDecideInFlight = false;
    let lastInterruptDecideAt = 0;
    const INTERRUPT_DECIDE_MIN_INTERVAL_MS = 260;

    // turn finalize guards
    let finalizeTurnTimer = null;
    let pendingFinalize = false;
    let finalizingUserTurn = false;
    let currentInputTurnSeq = 0;
    let finalizedInputTurnSeq = 0;
    let appendedUserMessageTurnSeq = 0;
    let streamTriggeredTurnSeq = 0;

    let sessionTimerSec = 0;
    let timerHandle = null;
    let interruptionEvalTimer = null;

    function nowTime() {
      const d = new Date();
      return `${String(d.getHours()).padStart(2, "0")}:${String(d.getMinutes()).padStart(2, "0")}:${String(d.getSeconds()).padStart(2, "0")}`;
    }

    function formatDuration(seconds) {
      const mm = String(Math.floor(seconds / 60)).padStart(2, "0");
      const ss = String(seconds % 60).padStart(2, "0");
      return `${mm}:${ss}`;
    }

    function startTimer() {
      if (timerHandle) return;
      timerHandle = setInterval(() => {
        sessionTimerSec += 1;
        sessionTimerEl.textContent = formatDuration(sessionTimerSec);
      }, 1000);
    }

    function stopTimer() {
      if (!timerHandle) return;
      clearInterval(timerHandle);
      timerHandle = null;
    }

    function updateStatus() {
      const rtcConnectionState = rtcPc ? rtcPc.connectionState : "closed";
      const rtcDataChannelOpen = !!rtcDc && rtcDc.readyState === "open";
      micStateEl.textContent = recognitionState;
      playbackStateEl.textContent = assistantSpeaking ? playbackStage : "idle";
      turnStateEl.textContent = currentTurnId || "-";

      agentDebugEl.textContent = JSON.stringify(
        {
          recognition_state: recognitionState,
          recognition_running: recognitionRunning,
          recognition_starting: recognitionStarting,
          should_keep_listening: shouldKeepListening,
          assistant_speaking: assistantSpeaking,
          playback_stage: playbackStage,
          current_tts_text_buffer: ttsTextBuffer,
          pending_tts_requests_count: pendingTtsRequestsCount,
          pcm_queue_length: pcmQueue.length,
          current_audio_queue_length: pcmQueue.length,
          pcm_playing: pcmPlaying,
          current_pcm_playing: pcmPlaying,
          pcm_current_turn_id: pcmCurrentTurnId,
          last_tts_flush_text: lastTtsFlushText,
          last_audio_chunk_size: lastAudioChunkSize,
          audio_buffer_size: micRingFilled ? micRingBufferSize : micRingWriteIndex,
          last_audio_chunk_duration_ms: lastAudioChunkDurationMs,
          mic_capture_sample_rate: micCaptureSampleRate,
          realtime_connected: !!rtcPc && rtcPc.connectionState === "connected",
          currentTranscript: currentTranscript,
          currentCompletedTranscript: currentCompletedTranscript,
          last_finalize_source: lastFinalizeSource,
          active_input_item_id: activeInputItemId,
          pending_finalize: pendingFinalize,
          finalizing_user_turn: finalizingUserTurn,
          current_input_turn_seq: currentInputTurnSeq,
          finalized_input_turn_seq: finalizedInputTurnSeq,
          appended_user_turn_seq: appendedUserMessageTurnSeq,
          stream_triggered_turn_seq: streamTriggeredTurnSeq,
          pending_interrupt: pendingInterrupt,
          recent_assistant_text: recentAssistantText,
          ignore_echo_until: ignoreEchoUntil,
          // NEW: backchannel debug state
          user_speaking: userSpeaking,
          userSpeaking,
          partialTranscript,
          partialTurnConsumed,
          partialTurnTakeoverUsed,
          pauseMs,
          cooldownActive: Date.now() < assistantInterjectCooldownUntil,
          lastInterruptDecision,
          last_speech_started_at: lastSpeechStartedAt,
          last_transcript_update_at: lastTranscriptUpdateAt,
          active_user_transcript: activeUserTranscript,
          assistant_interject_cooldown_until: assistantInterjectCooldownUntil,
          lastTranscriptUpdateAt,
          assistantInterjectCooldownUntil,
          rtc_connection_state: rtcConnectionState,
          rtc_data_channel_open: rtcDataChannelOpen,
          current_turn_id: currentTurnId,
          currentTurnId,
          current_turn_active: currentTurnActive,
          currentTurnActive,
          current_assistant_text:
            (messages.find((m) => m.id === activeAssistantMessageId) || {}).text || "",
          activeUserMessageText,
          active_user_message_id: activeUserMessageId,
          active_user_message_turn_seq: activeUserMessageTurnSeq,
          lastInterruptionAction: (lastInterruptDecision || {}).action || "none",
          conversation_mode: conversationMode,
          story_auto_continue_count: storyAutoContinueCount,
        },
        null,
        2
      );
    }

    function setRecognitionState(v) {
      recognitionState = v;
      updateStatus();
    }

    function setLiveTranscript(text) {
      liveTranscriptEl.textContent = text && text.trim() ? text : "-";
    }

    function appendMessage(role, text, extra = {}) {
      const id = `${Date.now()}-${Math.random().toString(16).slice(2, 8)}`;
      messages.push({
        id,
        role,
        time: nowTime(),
        text: text || "",
        status: extra.status || (role === "assistant" ? "streaming" : "done"),
        turnId: extra.turnId || null
      });
      renderMessages();
      return messages[messages.length - 1];
    }

    function updateMessage(id, patch) {
      const msg = messages.find((m) => m.id === id);
      if (!msg) return;
      Object.assign(msg, patch);
      renderMessages();
    }

    function renderMessages() {
      messagesEl.innerHTML = "";
      emptyHintEl.style.display = messages.length ? "none" : "block";

      for (const m of messages) {
        const row = document.createElement("li");
        row.className = `msg-row ${m.role}`;

        const bubble = document.createElement("article");
        bubble.className = `msg ${m.role}`;

        const meta = document.createElement("div");
        meta.className = "meta";

        const speaker = document.createElement("span");
        speaker.className = "speaker";
        speaker.textContent = m.role === "user" ? "User" : "Assistant";

        const right = document.createElement("div");
        right.style.display = "flex";
        right.style.alignItems = "center";
        right.style.gap = "8px";

        const time = document.createElement("span");
        time.textContent = m.time;
        right.appendChild(time);

        if (m.role === "assistant" || (m.role === "user" && m.status === "streaming")) {
          const status = document.createElement("span");
          status.className = `status-pill ${m.status || "done"}`;
          status.textContent = m.status || "done";
          right.appendChild(status);
        }

        meta.appendChild(speaker);
        meta.appendChild(right);

        const body = document.createElement("div");
        body.className = "body";
        if (m.role === "user" && m.status === "streaming") {
          body.textContent = m.text || "";
        } else {
          body.textContent = m.text || "...";
        }

        bubble.appendChild(meta);
        bubble.appendChild(body);
        row.appendChild(bubble);
        messagesEl.appendChild(row);
      }

      timelineEl.scrollTop = timelineEl.scrollHeight;
    }

    async function ensureAudioContext() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 24000 });
      }
      if (audioCtx.state === "suspended") {
        await audioCtx.resume();
      }
      return audioCtx;
    }

    function concatUint8(a, b) {
      if (!a || a.length === 0) return b;
      if (!b || b.length === 0) return a;
      const out = new Uint8Array(a.length + b.length);
      out.set(a, 0);
      out.set(b, a.length);
      return out;
    }

    function downsampleFloat32(samples, inRate, outRate) {
      if (!samples || samples.length === 0) return new Float32Array(0);
      if (!inRate || !outRate || inRate === outRate) return samples;
      const ratio = inRate / outRate;
      const outLength = Math.max(1, Math.floor(samples.length / ratio));
      const out = new Float32Array(outLength);
      for (let i = 0; i < outLength; i++) {
        const start = Math.floor(i * ratio);
        const end = Math.min(samples.length, Math.floor((i + 1) * ratio));
        let sum = 0;
        let count = 0;
        for (let j = start; j < end; j++) {
          sum += samples[j];
          count += 1;
        }
        out[i] = count > 0 ? sum / count : 0;
      }
      return out;
    }

    function float32ToInt16Bytes(samples) {
      const out = new Uint8Array(samples.length * 2);
      const view = new DataView(out.buffer);
      for (let i = 0; i < samples.length; i++) {
        const s = Math.max(-1, Math.min(1, samples[i]));
        const v = s < 0 ? Math.round(s * 32768) : Math.round(s * 32767);
        view.setInt16(i * 2, v, true);
      }
      return out;
    }

    function uint8ToBase64(bytes) {
      let binary = "";
      const chunkSize = 0x8000;
      for (let i = 0; i < bytes.length; i += chunkSize) {
        const chunk = bytes.subarray(i, i + chunkSize);
        binary += String.fromCharCode.apply(null, chunk);
      }
      return btoa(binary);
    }

    function connectDeepgram() {
      if (deepgramWs && (deepgramWs.readyState === WebSocket.OPEN || deepgramWs.readyState === WebSocket.CONNECTING)) {
        return;
      }
      if (!DEEPGRAM_API_KEY) {
        console.log("[Deepgram] API key missing");
        return;
      }
      try {
        deepgramWs = new WebSocket(DEEPGRAM_URL, ["token", DEEPGRAM_API_KEY]);
        deepgramWs.binaryType = "arraybuffer";
        deepgramWs.onopen = () => {
          if (deepgramReconnectTimer) {
            clearTimeout(deepgramReconnectTimer);
            deepgramReconnectTimer = null;
          }
          console.log("[Deepgram ws open]");
        };
        deepgramWs.onerror = (err) => {
          console.log("[Deepgram ws error]", err);
        };
        deepgramWs.onclose = (ev) => {
          console.log("[Deepgram ws close]", { code: ev.code, reason: ev.reason });

          if (shouldKeepListening) {

            deepgramReconnectTimer = setTimeout(() => {
              deepgramReconnectTimer = null;
              if (shouldKeepListening) connectDeepgram();

          }

        deepgramWs.onmessage = (ev) => {

      } catch (err) {

      }

    function handleDeepgramMessage(raw) {
      let msg;
      try {
        msg = JSON.parse(raw);
      } catch {
        return;

      const alt = (((msg || {}).channel || {}).alternatives || [])[0] || {};
      const transcript = (alt.transcript || "").trim();
      console.log("[Deepgram result raw]", msg);
      console.log("[Deepgram transcript]", {
        transcript,
        confidence: alt.confidence ?? null,
        is_final: !!msg.is_final,
        speech_final: !!msg.speech_final,
      });
      const isFinal = !!msg.is_final || !!msg.speech_final;

      if (transcript) {
        handleUserPartial(transcript);
      }
      if (isFinal && transcript) {
        if (deepgramFinalizeTimer) {
          clearTimeout(deepgramFinalizeTimer);
          deepgramFinalizeTimer = null;

        if (transcript.length > 5) {
          handleUserFinal(transcript);

    function initMicAudioBuffer(stream) {
      try {
        destroyMicAudioBuffer();
        micCaptureCtx = new (window.AudioContext || window.webkitAudioContext)();
        micCaptureSampleRate = micCaptureCtx.sampleRate || 48000;
        micRingBufferSize = Math.max(1, Math.floor(micCaptureSampleRate * 1.0));
        micRingBuffer = new Float32Array(micRingBufferSize);
        micRingWriteIndex = 0;
        micRingFilled = false;

        micCaptureSource = micCaptureCtx.createMediaStreamSource(stream);
        micCaptureProcessor = micCaptureCtx.createScriptProcessor(2048, 1, 1);
        micCaptureProcessor.onaudioprocess = (e) => {
          if (!micRingBuffer) return;
          const input = e.inputBuffer.getChannelData(0);
          for (let i = 0; i < input.length; i++) {
            micRingBuffer[micRingWriteIndex] = input[i];
            micRingWriteIndex = (micRingWriteIndex + 1) % micRingBufferSize;
            if (micRingWriteIndex === 0) micRingFilled = true;
          }
          if (!deepgramWs || deepgramWs.readyState !== WebSocket.OPEN) {
            connectDeepgram();
            return;
          }
          if (deepgramWs && deepgramWs.readyState === WebSocket.OPEN) {
            try {
              const down = downsampleFloat32(
                input,
                micCaptureSampleRate,
                DEEPGRAM_TARGET_SAMPLE_RATE
              );
              if (!down || down.length === 0) return;

              let energy = 0;
              for (let i = 0; i < down.length; i++) {
                energy += down[i] * down[i];
              }
              const rms = Math.sqrt(energy / down.length);
              if (rms < DEEPGRAM_VAD_RMS_THRESHOLD) {
                return;
              }

              const int16Bytes = float32ToInt16Bytes(down);
              deepgramAudioByteBuffer = concatUint8(deepgramAudioByteBuffer, int16Bytes);

              while (deepgramAudioByteBuffer.length >= DEEPGRAM_CHUNK_BYTES) {
                const chunk = deepgramAudioByteBuffer.slice(0, DEEPGRAM_CHUNK_BYTES);
                deepgramAudioByteBuffer = deepgramAudioByteBuffer.slice(DEEPGRAM_CHUNK_BYTES);
                deepgramWs.send(chunk.buffer);
                console.log("[Deepgram send chunk]", {
                  sample_rate: DEEPGRAM_TARGET_SAMPLE_RATE,
                  bytes: chunk.byteLength,
                  chunk_ms: DEEPGRAM_CHUNK_MS,
                  rms: Number(rms.toFixed(6)),
                });
              }
            } catch (err) {
              console.log("[Deepgram] send audio error", err);
            }
          }
        };
        micCaptureSource.connect(micCaptureProcessor);
        micCaptureProcessor.connect(micCaptureCtx.destination);
      } catch (err) {
        console.log("[mic audio buffer init error]", err);
        destroyMicAudioBuffer();
      }
    }

    function destroyMicAudioBuffer() {
      try {
        if (micCaptureProcessor) micCaptureProcessor.disconnect();
      } catch {}
      try {
        if (micCaptureSource) micCaptureSource.disconnect();
      } catch {}
      try {
        if (micCaptureCtx) micCaptureCtx.close();
      } catch {}
      micCaptureProcessor = null;
      micCaptureSource = null;
      micCaptureCtx = null;
      micCaptureSampleRate = 0;
      micRingBuffer = null;
      micRingBufferSize = 0;
      micRingWriteIndex = 0;
      micRingFilled = false;
      lastAudioChunkDurationMs = 0;
    }

    function getRecentAudioChunkBase64(maxMs = 800, targetSampleRate = 16000) {
      if (!micRingBuffer || !micCaptureSampleRate || micRingBufferSize === 0) {
        lastAudioChunkDurationMs = 0;
        return { audioBase64: "", sampleRate: targetSampleRate, durationMs: 0 };
      }

      const available = micRingFilled ? micRingBufferSize : micRingWriteIndex;
      if (available <= 0) {
        lastAudioChunkDurationMs = 0;
        return { audioBase64: "", sampleRate: targetSampleRate, durationMs: 0 };
      }

      const wanted = Math.min(
        available,
        Math.max(1, Math.floor((micCaptureSampleRate * maxMs) / 1000))
      );
      const out = new Float32Array(wanted);
      const start = (micRingWriteIndex - wanted + micRingBufferSize) % micRingBufferSize;
      if (start + wanted <= micRingBufferSize) {
        out.set(micRingBuffer.subarray(start, start + wanted), 0);
      } else {
        const firstLen = micRingBufferSize - start;
        out.set(micRingBuffer.subarray(start), 0);
        out.set(micRingBuffer.subarray(0, wanted - firstLen), firstLen);
      }

      const down = downsampleFloat32(out, micCaptureSampleRate, targetSampleRate);
      const int16Bytes = float32ToInt16Bytes(down);
      const durationMs = Math.floor((down.length / targetSampleRate) * 1000);
      lastAudioChunkDurationMs = durationMs;
      return {
        audioBase64: uint8ToBase64(int16Bytes),
        sampleRate: targetSampleRate,
        durationMs,
      };
    }

    function pcmBytesToFloat32(pcmBytes) {
      const sampleCount = Math.floor(pcmBytes.length / 2);
      const view = new DataView(
        pcmBytes.buffer,
        pcmBytes.byteOffset,
        sampleCount * 2
      );
      const out = new Float32Array(sampleCount);
      for (let i = 0; i < sampleCount; i++) {
        const s = view.getInt16(i * 2, true);
        out[i] = Math.max(-1, Math.min(1, s / 32768));
      }
      return out;
    }

    function base64ToUint8Array(base64) {
      const binary = atob(base64);
      const len = binary.length;
      const bytes = new Uint8Array(len);
      for (let i = 0; i < len; i++) {
        bytes[i] = binary.charCodeAt(i);
      }
      return bytes;
    }

        });

    async function decideAssistantInterruption() {
      const now = Date.now();
      const text = (partialTranscript || "").trim();
      pauseMs = now - lastTranscriptUpdateAt;
      const textLen = text.length;
      const inCooldown = now < assistantInterjectCooldownUntil;
      const hasActiveAssistant = hasActiveAssistantTurn();
      const candidate = {
        partialTranscript: text,
        userSpeaking,
        assistantSpeaking,
        partialTurnConsumed,
        partialTurnTakeoverUsed,
        textLen,
        pauseMs,
        inCooldown,
        hasActiveAssistantTurn: hasActiveAssistant,
        conversationMode,
      };
      console.log("[assistant interruption candidate]", candidate);

      if (
        !userSpeaking ||
        assistantSpeaking ||
        partialTurnConsumed ||
        inCooldown ||
        textLen < 6 ||
        pauseMs < 350 ||
        pauseMs > 1500 ||
        isNoisyPartial(text)
      ) {
        lastInterruptDecision = { action: "none", reason: "frontend_gate", reply_text: "" };
        console.log("[assistant interruption evaluate]", {
          ...candidate,
          cooldownActive: inCooldown,
          action: "none",
        });
        updateStatus();
        return "none";
      }

      if (interruptDecideInFlight) return "none";
      if (now - lastInterruptDecideAt < INTERRUPT_DECIDE_MIN_INTERVAL_MS) return "none";
      interruptDecideInFlight = true;
      lastInterruptDecideAt = now;

      try {
        const payload = {
          mode: conversationMode,
          partial_text: text,
          pause_ms: pauseMs,
          user_speaking: userSpeaking,
          assistant_speaking: assistantSpeaking,
          cooldown_active: inCooldown,
          recent_history: buildRecentHistory(),
          audio_chunk_base64: "",
          audio_sample_rate: 16000,
        };
        const audioPacket = getRecentAudioChunkBase64(800, 16000);
        payload.audio_chunk_base64 = audioPacket.audioBase64 || "";
        payload.audio_sample_rate = audioPacket.sampleRate || 16000;
        console.log("[interrupt_decide request]", {
          ...payload,
          audio_chunk_base64: payload.audio_chunk_base64 ? "<base64>" : "",
          audio_base64_len: payload.audio_chunk_base64 ? payload.audio_chunk_base64.length : 0,
          audio_duration_ms: audioPacket.durationMs || 0,
        });
        const resp = await fetch(`${API_BASE}/interrupt_decide`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });
        if (!resp.ok) {
          const errText = await resp.text();
          throw new Error(`/interrupt_decide failed: ${resp.status} ${errText}`);
        }
        const result = await resp.json();
        console.log("[interrupt_decide response]", result);
        lastInterruptDecision = result || { action: "none", reason: "empty_result", reply_text: "" };
        let action = lastInterruptDecision.action || "none";
        if (action === "none") {
          if (textLen >= 12 && pauseMs >= 600) action = "takeover";
          else if (textLen >= 6) action = "backchannel";
        }
        console.log("[assistant interruption evaluate]", {
          ...candidate,
          cooldownActive: inCooldown,
          action,
        });
        updateStatus();
        return action;
      } catch (err) {
        console.log("[interrupt_decide error]", err);
        let action = "none";
        if (textLen >= 12 && pauseMs >= 600) action = "takeover";
        else if (textLen >= 6) action = "backchannel";
        lastInterruptDecision = { action, reason: "request_error_fallback", reply_text: "" };
        console.log("[assistant interruption evaluate]", {
          ...candidate,
          cooldownActive: inCooldown,
          action,
        });
        updateStatus();
        return action;
      } finally {
        interruptDecideInFlight = false;
      }
    }

    function scheduleInterruptionEvalTick() {
      if (interruptionEvalTimer) return;
      interruptionEvalTimer = setInterval(() => {
        if (!shouldKeepListening) return;
        if (!userSpeaking) return;
        if (partialTurnConsumed) return;
        if (!(partialTranscript || "").trim()) return;
        decideAssistantInterruption()
          .then((assistantAction) => {
            if (assistantAction === "backchannel") {
              triggerAssistantBackchannel(lastInterruptDecision.reply_text || "");
            } else if (assistantAction === "takeover") {
              startAssistantTakeover();
            }
          })
          .catch((err) => console.log("[assistant interruption evaluate error]", err));
      }, 400);
    }

    function stopInterruptionEvalTick() {
      if (!interruptionEvalTimer) return;
      clearInterval(interruptionEvalTimer);
      interruptionEvalTimer = null;

    function triggerAssistantBackchannel(replyText = "") {
      const candidates = ["嗯", "好的", "明白", "我在听", "继续说"];
      const reply = (replyText || "").trim() || candidates[Math.floor(Math.random() * candidates.length)];
      assistantInterjectCooldownUntil = Date.now() + ASSISTANT_INTERJECT_COOLDOWN_MS;
      console.log("[assistant backchannel triggered]", { reply, partialTranscript });
      enqueueTTS(reply, "backchannel");
    }

    function startAssistantTakeover() {
      const text = (partialTranscript || "").trim();
      if (!text || partialTurnConsumed) return;
      const turnSeqAtTakeover = currentInputTurnSeq;
      partialTurnConsumed = true;
      partialTurnTakeoverUsed = true;
      userSpeaking = false;
      clearFinalizeTurnTimer();
      pendingFinalize = false;
      finalizedInputTurnSeq = Math.max(finalizedInputTurnSeq, turnSeqAtTakeover);
      appendedUserMessageTurnSeq = Math.max(appendedUserMessageTurnSeq, turnSeqAtTakeover);
      streamTriggeredTurnSeq = Math.max(streamTriggeredTurnSeq, turnSeqAtTakeover);
      assistantInterjectCooldownUntil = Date.now() + ASSISTANT_INTERJECT_COOLDOWN_MS;
      lastTakeoverAt = Date.now();

      console.log("[assistant takeover triggered]", {
        text,
        currentInputTurnSeq,
        turnSeqAtTakeover,
      });

      finalizeActiveUserStreamingMessage(text, turnSeqAtTakeover, "takeover");
      streamReply(text, { mode: conversationMode }).catch((err) => {
        streamDebugEl.textContent = JSON.stringify(
          { phase: "assistant_takeover_stream_error", error: err.message },
          null,
          2
        );
      });
    }

    function detectStoryIntent(text) {
      const t = (text || "").trim();
      if (!t) return false;
      const patterns = ["讲个故事", "开始讲吧", "继续讲", "说下去", "然后呢"];
      return patterns.some((p) => t.includes(p));
    }

    function isStoryOpeningOnly(text) {
      const t = (text || "").trim();
      if (!t) return false;
      if (t.length > 28) return false;
      const openingPatterns = [
        "好的，那我开始讲啦",
        "那我开始了",
        "好，我们开始",
        "好的，我开始讲",
        "那我开始讲",
      ];
      return openingPatterns.some((p) => t.includes(p));
    }

    function stopCurrentPlayback(reason = "manual") {
      interruptCurrentTurn(reason);
    }

    async function pumpPcmPlaybackQueue() {
      if (pcmQueueScheduling) return;
      pcmQueueScheduling = true;
      try {
        const ctx = await ensureAudioContext();
        while (pcmQueue.length > 0) {
          const item = pcmQueue.shift();
          if (!item) continue;

          const validTurn =
            item.turnId === "backchannel" || item.turnId === currentTurnId;
          if (!validTurn) {
            continue;
          }

          const buffer = ctx.createBuffer(1, item.samples.length, 24000);
          buffer.copyToChannel(item.samples, 0, 0);

          const source = ctx.createBufferSource();
          source.buffer = buffer;
          source.connect(ctx.destination);

          const now = ctx.currentTime;
          if (pcmNextPlayTime < now + 0.01) {
            pcmNextPlayTime = now + 0.01;
          }
          const startAt = pcmNextPlayTime;
          pcmNextPlayTime += buffer.duration;

          console.log("[PCM playback start]", {
            turn_id: item.turnId,
            duration: buffer.duration,
            start_at: startAt,
          });
          console.log("[pcm playback start]", {
            turn_id: item.turnId,
            duration: buffer.duration,
            start_at: startAt,
          });

          source.start(startAt);
          const ref = { source, turnId: item.turnId };
          activePcmSources.push(ref);
          pcmPlaying = true;
          assistantSpeaking = true;
          playbackStage = "tts_streaming";
          pcmCurrentTurnId = item.turnId;
          updateStatus();

          source.onended = () => {
            const idx = activePcmSources.indexOf(ref);
            if (idx >= 0) activePcmSources.splice(idx, 1);
            console.log("[PCM playback end]", {
              turnId: item.turnId,
              remaining_active: activePcmSources.length,
              remainingQueue: pcmQueue.length,
              pcmPlaying,
            });
            if (activePcmSources.length === 0 && pcmQueue.length === 0) {
              pcmPlaying = false;
              assistantSpeaking = false;
              playbackStage = "idle";
              pcmCurrentTurnId = null;
              if (activeAssistantMessageId) {
                const target = messages.find((m) => m.id === activeAssistantMessageId);
                if (target && target.status !== "interrupted") {
                  updateMessage(activeAssistantMessageId, { status: "done" });
                }
              }
            }
            updateStatus();
          };
        }
      } finally {
        pcmQueueScheduling = false;
      }
    }

    function enqueuePcmSamples(samples, turnId) {
      const validTurn = turnId === "backchannel" || turnId === currentTurnId;
      if (!validTurn || !samples || samples.length === 0) return;
      pcmQueue.push({ samples, turnId });
      console.log("[PCM enqueue]", {
        turn_id: turnId,
        samples: samples.length,
        queue_length: pcmQueue.length,
      });
      console.log("[pcm enqueue]", {
        turn_id: turnId,
        samples: samples.length,
        queue_length: pcmQueue.length,
      });
      pumpPcmPlaybackQueue().catch((err) => {
        console.log("[PCM playback error]", err);
      });
      updateStatus();
    }

    async function streamTTSByProxy(text, turnId) {
      const normalizedTurnId = turnId || currentTurnId || "backchannel";
      const validTurn = normalizedTurnId === "backchannel" || normalizedTurnId === currentTurnId;
      if (!validTurn) return;

      const controller = new AbortController();
      pendingTtsControllers.push({ controller, turnId: normalizedTurnId });
      pendingTtsRequestsCount += 1;
      updateStatus();

      try {
        console.log("[TTS stream start]", { text, turn_id: normalizedTurnId });
        const resp = await fetch(`${API_BASE}/tts_proxy`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ text }),
          signal: controller.signal,
        });
        if (!resp.ok || !resp.body) {
          const errText = await resp.text();
          throw new Error(`/tts_proxy failed: ${resp.status} ${errText}`);
        }

        const reader = resp.body.getReader();
        let pcmByteBuffer = new Uint8Array(0);
        const MIN_PCM_BYTES = 4096; // 2048 samples @ 24k mono

        while (true) {
          const { value, done } = await reader.read();
          if (done) break;
          if (!value || value.length === 0) continue;
          console.log("[TTS pcm chunk]", value.length);

          if (
            normalizedTurnId !== "backchannel" &&
            normalizedTurnId !== currentTurnId
          ) {
            break;
          }

          pcmByteBuffer = concatUint8(pcmByteBuffer, value);
          while (pcmByteBuffer.length >= MIN_PCM_BYTES) {
            const usableBytes = MIN_PCM_BYTES - (MIN_PCM_BYTES % 2);
            const pcmPart = pcmByteBuffer.slice(0, usableBytes);
            pcmByteBuffer = pcmByteBuffer.slice(usableBytes);
            const samples = pcmBytesToFloat32(pcmPart);
            enqueuePcmSamples(samples, normalizedTurnId);
          }
        }

        if (pcmByteBuffer.length >= 2) {
          const usableBytes = pcmByteBuffer.length - (pcmByteBuffer.length % 2);
          const pcmPart = pcmByteBuffer.slice(0, usableBytes);
          const samples = pcmBytesToFloat32(pcmPart);
          enqueuePcmSamples(samples, normalizedTurnId);
        }
      } catch (err) {
        if (err.name === "AbortError") {
          console.log("[PCM interrupted]");
        } else {
          console.log("[TTS stream error]", err);
        }
      } finally {
        pendingTtsControllers = pendingTtsControllers.filter((x) => x.controller !== controller);
        pendingTtsRequestsCount = Math.max(0, pendingTtsRequestsCount - 1);
        updateStatus();
      }
    }

    function flushTTSBuffer() {
      const text = (ttsTextBuffer || "").trim();
      if (!text) return;
      const turnId = ttsBufferTurnId || currentTurnId || "backchannel";
      lastTtsFlushText = text;
      console.log("[TTS text flush]", { turn_id: turnId, text });
      ttsTextBuffer = "";
      ttsBufferTurnId = null;
      streamTTSByProxy(text, turnId).catch((err) => {
        console.log("[TTS proxy error]", err);
      });
      updateStatus();
    }

    function enqueueTTS(text, turnId) {
      if (!text || !text.trim()) return;
      const normalizedTurnId = turnId || currentTurnId || "backchannel";

      if (ttsBufferTurnId && ttsBufferTurnId !== normalizedTurnId) {
        flushTTSBuffer();
      }
      ttsBufferTurnId = normalizedTurnId;
      ttsTextBuffer += text;

      const trimmed = ttsTextBuffer.trim();
      const endsStrong = /[。！？!?\n]$/.test(trimmed);
      const endsWeak = /[，、,；;]$/.test(trimmed);
      const shouldFlushNow =
        endsStrong ||
        (endsWeak && trimmed.length >= 14) ||
        trimmed.length >= 24;

      if (ttsFlushTimer) {
        clearTimeout(ttsFlushTimer);
        ttsFlushTimer = null;
      }

      if (shouldFlushNow) {
        flushTTSBuffer();
      } else {
        ttsFlushTimer = setTimeout(() => {
          ttsFlushTimer = null;
          flushTTSBuffer();
        }, 320);
      }
      updateStatus();
    }

    async function streamReply(userText, opts = {}) {
      const mode = opts.mode || conversationMode || "chat";
      const isAutoContinue = !!opts.isAutoContinue;

      if (hasActiveAssistantTurn()) {
        interruptCurrentTurn("new_stream_start");
      }

      currentStreamController = new AbortController();

      const resp = await fetch(`${API_BASE}/stream_reply_audio`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ session_id: sessionId, user_text: userText, mode }),
        signal: currentStreamController.signal
      });

      if (!resp.ok) {
        const txt = await resp.text();
        throw new Error(`/stream_reply_audio failed: ${resp.status} ${txt}`);
      }
      if (!resp.body) {
        throw new Error("No response body from /stream_reply_audio");
      }

      const reader = resp.body.getReader();
      const decoder = new TextDecoder("utf-8");
      let buffer = "";
      let myTurnId = null;
      let localAssistantMsgId = null;
      let fullReply = "";

      try {
        while (true) {
          const { value, done } = await reader.read();
          if (done) break;

          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split("\n");
          buffer = lines.pop() || "";

          for (const line of lines) {
            if (!line.trim()) continue;

            let chunk;
            try {
              chunk = JSON.parse(line);
            } catch {
              continue;
            }

            if (chunk.type === "start") {
              console.log("[audio stream start]", chunk);
              myTurnId = chunk.turn_id;
              currentTurnId = myTurnId;
              currentTurnActive = true;
              fullReply = "";
              localAssistantMsgId = appendMessage("assistant", "", {
                status: "streaming",
                turnId: myTurnId
              }).id;
              activeAssistantMessageId = localAssistantMsgId;
              updateStatus();
              continue;
            }

            if (myTurnId && chunk.turn_id && chunk.turn_id !== currentTurnId) {
              const discardKind =
                chunk.type === "audio_chunk"
                  ? "audio"
                  : chunk.type === "text_chunk"
                    ? "text"
                    : "event";
              if (discardKind === "audio") {
                console.log("[audio turn discarded]", {
                  currentTurnId,
                  chunkTurnId: chunk.turn_id,
                  type: chunk.type,
                });
              } else if (discardKind === "text") {
                console.log("[text turn discarded]", {
                  currentTurnId,
                  chunkTurnId: chunk.turn_id,
                  type: chunk.type,
                });
              }
              console.log("[turn discarded]", {
                currentTurnId,
                chunkTurnId: chunk.turn_id,
                type: chunk.type,
                kind: discardKind,
              });
              continue;
            }
            if (!localAssistantMsgId) continue;

            if (chunk.type === "text_chunk") {
              console.log("[text_chunk received]", {
                turn_id: myTurnId,
                text: chunk.text || "",
              });
              fullReply += chunk.text || "";
              pushRecentAssistantText(chunk.text || "");
              updateMessage(localAssistantMsgId, {
                text: fullReply,
                status: assistantSpeaking ? "speaking" : "streaming"
              });

              streamDebugEl.textContent = JSON.stringify(
                { phase: "streaming", turn_id: myTurnId, response_text: fullReply },
                null,
                2
              );
              continue;
            }

            if (chunk.type === "audio_chunk") {
              if (!chunk.pcm_base64) continue;
              const pcmBytes = base64ToUint8Array(chunk.pcm_base64);
              lastAudioChunkSize = pcmBytes.length;
              console.log("[audio_chunk received]", {
                turn_id: myTurnId,
                bytes: pcmBytes.length,
              });
              const samples = pcmBytesToFloat32(pcmBytes);
              enqueuePcmSamples(samples, myTurnId);
              updateMessage(localAssistantMsgId, { status: "speaking" });
              continue;
            }

            if (chunk.type === "cancelled") {
              interruptCurrentTurn("server_cancelled");
              streamDebugEl.textContent = JSON.stringify(
                { phase: "cancelled", turn_id: chunk.turn_id, response_text: fullReply },
                null,
                2
              );
              return;
            }

            if (chunk.type === "done") {
              if (chunk.turn_id !== currentTurnId) return;

              updateMessage(localAssistantMsgId, {
                text: chunk.full_text || fullReply,
                status:
                  pcmPlaying ||
                  pendingTtsRequestsCount > 0 ||
                  !!ttsTextBuffer.trim()
                    ? "speaking"
                    : "done"
              });

              streamDebugEl.textContent = JSON.stringify(
                { phase: "done", turn_id: currentTurnId, response_text: chunk.full_text || fullReply },
                null,
                2
              );

              const doneText = (chunk.full_text || fullReply || "").trim();
              currentTurnActive = false;
              if (
                mode === "storytelling" &&
                isStoryOpeningOnly(doneText) &&
                storyAutoContinueCount < STORY_AUTO_CONTINUE_MAX &&
                currentTurnId === myTurnId
              ) {
                storyAutoContinueCount += 1;
                setTimeout(() => {
                  if (currentTurnId !== myTurnId) return;
                  streamReply("继续", { mode: "storytelling", isAutoContinue: true }).catch((err) => {
                    streamDebugEl.textContent = JSON.stringify(
                      { phase: "story_auto_continue_error", error: err.message },
                      null,
                      2
                    );
                  });
                }, 120);
              } else if (!isAutoContinue) {
                storyAutoContinueCount = 0;
              }
            }
          }
        }
      } catch (err) {
        if (err.name === "AbortError") {
          interruptCurrentTurn("stream_abort");
          streamDebugEl.textContent = JSON.stringify(
            { phase: "aborted", turn_id: currentTurnId },
            null,
            2
          );
        } else {
          streamDebugEl.textContent = JSON.stringify(
            { phase: "stream_error", error: err.message },
            null,
            2
          );
        }
      }
    }

    function clearRealtimeRestartTimer() {
      if (!rtcRestartTimer) return;
      clearTimeout(rtcRestartTimer);
      rtcRestartTimer = null;
    }

    function clearFinalizeTurnTimer() {
      if (!finalizeTurnTimer) return;
      clearTimeout(finalizeTurnTimer);
      finalizeTurnTimer = null;
    }

    function scheduleFinalizeUserTurn(delay = 250) {
      if (finalizingUserTurn) return;
      if (currentInputTurnSeq > 0 && finalizedInputTurnSeq >= currentInputTurnSeq) return;
      clearFinalizeTurnTimer();
      pendingFinalize = true;
      console.log("[Finalize candidate]", {
        reason: "speech_stopped",
        delay,
        turn_seq: currentInputTurnSeq,
      });
      finalizeTurnTimer = setTimeout(() => {
        finalizeTurnTimer = null;
        finalizeUserTurn("speech_stopped_timer").catch((err) => {
          streamDebugEl.textContent = JSON.stringify(
            { phase: "finalize_error", error: err.message },
            null,
            2
          );
        });
      }, delay);
    }

    function scheduleRealtimeRestart(delayMs = 500) {
      if (!shouldKeepListening) return;
      if (recognitionRunning || recognitionStarting) return;
      clearRealtimeRestartTimer();
      rtcRestartTimer = setTimeout(() => {
        rtcRestartTimer = null;
        if (!shouldKeepListening) return;
        startRecognitionSafely();
      }, delayMs);
    }

    function ensureInputTurnFromEvent(itemId, source) {
      if (!itemId) return;
      if (itemId === activeInputItemId) return;
      console.log("[ensureInputTurnFromEvent]", {
        source,
        itemId,
        activeInputItemId,
        currentInputTurnSeq,
        finalizedInputTurnSeq,
      });
      const hasUnfinishedInputTurn =
        currentInputTurnSeq > 0 && finalizedInputTurnSeq < currentInputTurnSeq;
      if (hasUnfinishedInputTurn) {
        // Same utterance may emit different item_id across speech_started/delta/completed.
        // Keep one input turn seq to avoid duplicate consumption.
        activeInputItemId = itemId;
        console.log("[input item rebound]", {
          source,
          itemId,
          currentInputTurnSeq,
          finalizedInputTurnSeq,
        });
        return;
      }
      currentInputTurnSeq += 1;
      clearFinalizeTurnTimer();
      pendingFinalize = false;
      finalizingUserTurn = false;
      activeInputItemId = itemId;
      currentTranscript = "";
      currentCompletedTranscript = "";
      resetUserTurnFlagsOnly(`ensure_input_turn:${source}`);
      console.log("[Turn state reset]", {
        reason: source,
        pendingFinalize,
        finalizingUserTurn,
        assistantSpeaking,
        pcmPlaying,
        activeInputItemId,
        currentTurnId,
        audioCurrentTurnId: pcmCurrentTurnId,
      });
    }

    function resetTranscriptTurnBuffer() {
      currentTranscript = "";
      currentCompletedTranscript = "";
      activeInputItemId = null;
      resetUserSpeechState("reset_transcript_turn_buffer");
      setLiveTranscript("");
      console.log("[Turn state reset]", {
        reason: "reset_transcript_turn_buffer",
        pendingFinalize,
        finalizingUserTurn,
        assistantSpeaking,
        pcmPlaying,
        activeInputItemId,

    async function getRealtimeSession() {
      const resp = await fetch(`${API_BASE}/realtime/session`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ session_id: sessionId })
      });

      if (!resp.ok) {
        const txt = await resp.text();
        throw new Error(`/realtime/session failed: ${resp.status} ${txt}`);
      }
      return resp.json();
    }

    async function openRealtimeConnection() {
      const data = await getRealtimeSession();
      const clientSecret = data.client_secret;
      realtimeModel = data.model || realtimeModel;

      if (!clientSecret) {
        throw new Error("missing realtime client_secret");
      }

      rtcPc = new RTCPeerConnection();

      remoteAudioEl = remoteAudioEl || document.createElement("audio");
      remoteAudioEl.autoplay = true;
      remoteAudioEl.muted = true;
      remoteAudioEl.style.display = "none";
      if (!remoteAudioEl.parentNode) {
        document.body.appendChild(remoteAudioEl);
      }

      rtcPc.ontrack = (event) => {
        remoteAudioEl.srcObject = event.streams[0];
        remoteAudioEl.play().catch(() => {});
      };

      rtcPc.onconnectionstatechange = () => {
        const st = rtcPc.connectionState;
        console.log("[Realtime pc connectionstatechange]", st);
        if (st === "connected") {
          recognitionRunning = true;
          recognitionStarting = false;
          setRecognitionState("listening");
        } else if (st === "failed" || st === "disconnected" || st === "closed") {
          recognitionRunning = false;
          recognitionStarting = false;
          setRecognitionState("idle");
          if (shouldKeepListening) {
            scheduleRealtimeRestart(800);
          }
        }
      };

      rtcDc = rtcPc.createDataChannel("oai-events");
      rtcDc.onmessage = (ev) => handleRealtimeEvent(ev.data);
      rtcDc.onopen = () => {
        console.log("[Realtime dc open]");
        setRecognitionState("listening");
      };
      rtcDc.onclose = () => {
        console.log("[Realtime dc close]");
        if (
          !finalizingUserTurn &&
          currentInputTurnSeq > 0 &&
          finalizedInputTurnSeq < currentInputTurnSeq &&
          appendedUserMessageTurnSeq < currentInputTurnSeq &&
          streamTriggeredTurnSeq < currentInputTurnSeq &&
          (currentCompletedTranscript || "").trim()
        ) {
          console.log("[DC close fallback finalize]", {
            turn_seq: currentInputTurnSeq,
            completed: currentCompletedTranscript,
          });
          finalizeUserTurn("dc_close_fallback").catch((err) => {
            streamDebugEl.textContent = JSON.stringify(
              { phase: "dc_close_finalize_error", error: err.message },
              null,
              2
            );
          });
        }
        resetUserSpeechState("rtc_dc_close");
        if (shouldKeepListening) scheduleRealtimeRestart(800);
      };
      rtcDc.onerror = (err) => {
        console.log("[Realtime dc error]", err);
      };

      micStream = await navigator.mediaDevices.getUserMedia({
        audio: {
          echoCancellation: true,
          noiseSuppression: true,
          autoGainControl: true
        }
      });

      for (const track of micStream.getTracks()) {
        rtcPc.addTrack(track, micStream);
      }
      initMicAudioBuffer(micStream);

      const offer = await rtcPc.createOffer();
      await rtcPc.setLocalDescription(offer);

      const sdpResp = await fetch(
        `${OPENAI_REALTIME_CALLS_URL}?model=${encodeURIComponent(realtimeModel)}`,
        {
          method: "POST",
          headers: {
            Authorization: `Bearer ${clientSecret}`,
            "Content-Type": "application/sdp"
          },
          body: offer.sdp
        }
      );

      if (!sdpResp.ok) {
        const txt = await sdpResp.text();
        throw new Error(`realtime webrtc failed: ${sdpResp.status} ${txt}`);
      }

      const answer = await sdpResp.text();
      await rtcPc.setRemoteDescription({ type: "answer", sdp: answer });
    }

    function closeRealtimeConnection() {
      try { if (rtcDc) rtcDc.close(); } catch {}
      try { if (rtcPc) rtcPc.close(); } catch {}

      rtcDc = null;
      rtcPc = null;

      if (micStream) {
        for (const t of micStream.getTracks()) t.stop();
      }
      micStream = null;
      destroyMicAudioBuffer();
      resetUserSpeechState("close_realtime_connection");

      recognitionRunning = false;
      recognitionStarting = false;
      setRecognitionState("idle");
    }

    async function startRecognitionSafely() {
      if (!shouldKeepListening) return;
      if (recognitionRunning || recognitionStarting) return;

      recognitionStarting = true;
      setRecognitionState("connecting");

      try {
        await openRealtimeConnection();
      } catch (err) {
        recognitionStarting = false;
        recognitionRunning = false;
        setRecognitionState("error");
        streamDebugEl.textContent = JSON.stringify(
          { phase: "realtime_connect_error", error: err.message },
          null,
          2
        );
        closeRealtimeConnection();
        if (shouldKeepListening) scheduleRealtimeRestart(1200);
      }
    }

    function stopRecognitionSafely() {
      clearRealtimeRestartTimer();
      closeRealtimeConnection();
      setRecognitionState("idle");
    }

    async function finalizeUserTurn(triggerReason = "normal") {
      if (finalizingUserTurn) return;
      if (currentInputTurnSeq > 0 && finalizedInputTurnSeq >= currentInputTurnSeq) return;
      if (partialTurnConsumed) {
        console.log("[Finalize skipped]", {
          reason: "partial_turn_consumed",
          triggerReason,
          currentInputTurnSeq,
        });
        finalizeActiveUserStreamingMessage(
          currentCompletedTranscript || currentTranscript || activeUserTranscript,
          currentInputTurnSeq,
          "partial_turn_consumed"
        );
        resetTranscriptTurnBuffer();
        return;
      }
      finalizingUserTurn = true;

      clearFinalizeTurnTimer();
      pendingFinalize = false;
      pendingInterrupt = false;
      interruptCandidateTranscript = "";
      const turnSeqAtStart = currentInputTurnSeq;

      try {
        const completedText = (currentCompletedTranscript || "").trim();
        const fallbackText = (currentTranscript || activeUserTranscript || "").trim();
        console.log("[Finalize candidate]", {
          transcript: currentTranscript,
          completed: currentCompletedTranscript,
          partialTurnConsumed,
          partialTurnTakeoverUsed,
          pendingFinalize,
          finalizingUserTurn,
          currentInputTurnSeq,
          finalizedInputTurnSeq,
          appendedUserMessageTurnSeq,
          streamTriggeredTurnSeq,
          assistantSpeaking,
          pcmPlaying,
          audioQueueLength: pcmQueue.length,
          currentTurnId,
          activeInputItemId,
        });
        let finalizeSource = "none";
        let finalText = "";
        if (completedText) {
          finalizeSource = "completed";
          finalText = completedText;
        } else if (fallbackText) {
          finalizeSource = "fallback";
          finalText = fallbackText;
        }
        lastFinalizeSource = finalizeSource;
        console.log("[Finalize candidate]", {
          reason: triggerReason,
          turn_seq: turnSeqAtStart,
          completed_len: completedText.length,
          fallback_len: fallbackText.length,
        });
        console.log("[Finalize source]", {
          source: finalizeSource,
          reason: triggerReason,
          turn_seq: turnSeqAtStart,
          completed: completedText,
          fallback: fallbackText,
        });

        finalizedInputTurnSeq = Math.max(finalizedInputTurnSeq, turnSeqAtStart);
        finalizeActiveUserStreamingMessage(
          finalText || fallbackText || completedText,
          turnSeqAtStart,
          "finalize"
        );
        resetTranscriptTurnBuffer();
        if (!finalText) return;
        if (finalText.length <= 6 && isLikelyEcho(finalText)) {
          streamDebugEl.textContent = JSON.stringify(
            { phase: "echo_filtered_finalize", text: finalText },
            null,
            2
          );
          return;
        }

        if (detectStoryIntent(finalText)) {
          conversationMode = "storytelling";
        } else if (conversationMode !== "storytelling") {
          conversationMode = "chat";
        }
        storyAutoContinueCount = 0;

        if (appendedUserMessageTurnSeq >= turnSeqAtStart) return;
        appendedUserMessageTurnSeq = turnSeqAtStart;
        // user message already finalized from active streaming bubble

        if (streamTriggeredTurnSeq >= turnSeqAtStart) return;
        streamTriggeredTurnSeq = turnSeqAtStart;
      console.log("[Trigger stream_reply_audio]", {
          turn_seq: turnSeqAtStart,
          turnSeq: turnSeqAtStart,
          mode: conversationMode,
          text: finalText,
          currentTurnId,
        });
        streamReply(finalText, { mode: conversationMode }).catch((err) => {
          streamDebugEl.textContent = JSON.stringify(
            { phase: "stream_reply_error", error: err.message },
            null,
            2
          );
        });
      } finally {
        finalizingUserTurn = false;
        updateStatus();
      }
    }

    function handleRealtimeEvent(raw) {
      console.log("[Realtime raw event]", raw);
      let evt;
      try {
        evt = JSON.parse(raw);
      } catch {
        return;
      }
      console.log("[Realtime event parsed]", evt);

      // speech_started: earliest interrupt point
      if (evt.type === "input_audio_buffer.speech_started") {
        console.log("[user speech started]", {
          item_id: evt.item_id,
          currentTurnId,
          assistantSpeaking,
          pcmPlaying,
        });
        // 新一轮语音开始，取消上一轮挂起 finalize
        clearFinalizeTurnTimer();
        pendingFinalize = false;

        if (hasActiveAssistantTurn()) {
          console.log("[user interrupt detected]", {
            reason: "speech_started_while_assistant_active",
            currentTurnId,
          });
          interruptCurrentTurn("user_interrupt");
        }
        currentTranscript = "";
        currentCompletedTranscript = "";
        partialTranscript = "";
        setLiveTranscript("");
        // NEW: user speech turn state
        userSpeaking = true;
        lastSpeechStartedAt = Date.now();
        pauseMs = 0;
        activeUserTranscript = "";
        partialTurnConsumed = false;
        partialTurnTakeoverUsed = false;
        pendingInterrupt = false;
        interruptCandidateTranscript = "";

        streamDebugEl.textContent = JSON.stringify(
          { phase: "realtime_speech_started", event: evt },
          null,
          2
        );
        updateStatus();
        return;
      }

      // transcript delta
      if (
        evt.type === "conversation.item.input_audio_transcription.delta" ||
        evt.type === "input_audio_transcription.delta"
      ) {
        // Disabled: transcript now comes from Deepgram WebSocket.
        return;
      }

      // transcript completed
      if (
        evt.type === "conversation.item.input_audio_transcription.completed" ||
        evt.type === "input_audio_transcription.completed"
      ) {
        // Disabled: transcript now comes from Deepgram WebSocket.
        return;
      }

      // speech_stopped: 先调度 finalize，给 completed 留出到达窗口
      if (evt.type === "input_audio_buffer.speech_stopped") {
        // NEW: user speech turn state
        userSpeaking = false;
        if (!partialTurnConsumed) {
          scheduleFinalizeUserTurn(250);
        }
        updateStatus();
      }
    }

    startBtn.onclick = () => {
      shouldKeepListening = true;
      startTimer();
      scheduleInterruptionEvalTick();
      connectDeepgram();
      startRecognitionSafely();
    };

    stopBtn.onclick = () => {
      shouldKeepListening = false;
      stopRecognitionSafely();
      clearFinalizeTurnTimer();
      pendingFinalize = false;
      storyAutoContinueCount = 0;
      stopCurrentPlayback("manual_stop");
      stopInterruptionEvalTick();
      closeDeepgram();
      resetUserSpeechState("stop_btn");
      stopTimer();
      setRecognitionState("idle");
      updateStatus();
    };

    clearBtn.onclick = () => {
      shouldKeepListening = false;
      stopRecognitionSafely();
      clearFinalizeTurnTimer();
      pendingFinalize = false;
      stopCurrentPlayback("clear");
      stopInterruptionEvalTick();
      closeDeepgram();
      resetUserSpeechState("clear_btn");
      stopTimer();

      sessionTimerSec = 0;
      sessionTimerEl.textContent = "00:00";

      messages = [];
      currentTurnId = null;
      activeAssistantMessageId = null;
      activeUserMessageId = null;
      activeUserMessageText = "";
      activeUserMessageTurnSeq = 0;
      conversationMode = "chat";
      storyAutoContinueCount = 0;
      resetTranscriptTurnBuffer();

      decideDebugEl.textContent = "{}";
      streamDebugEl.textContent = "{}";

      renderMessages();
      setRecognitionState("idle");
      updateStatus();
    };

    renderMessages();
    setRecognitionState("idle");
    updateStatus();
  </script>
</body>
</html>
